[flow]
name = "Assertions test"
tags = ["cross-platform", "assertions", "smoke"]

[flow.options]
# Explicit Min — fewest devices that tick every axis. Behaviour matches
# the Smart default today, but the annotation documents that we want
# deterministic plan-time coverage (not execute-time adaptive) for this
# assertion sweep.
coverage = "min"

[[flow.apps]]
name = "app"
[[flow.apps.devices]]
os = ["ios:latest", "android:latest"]
type = "phone"

# Test purpose is the assertion semantics (visibility, traits,
# enabled, checked, not_visible). Asserts are ordered by viewport
# proximity to the default Counter landing so auto_scroll moves
# strictly downward once — no bouncing back up.

[[block]]
name = "visibility_assertions"
steps = [
  # In-viewport (Counter section): no scroll needed
  { action = "assert_visible", on = { text = "Submit" } },
  { action = "assert_visible", on_text = "Counter" },
  { action = "assert_visible", on = { text = "Submit", traits = ["button", "has_text"] } },
  { action = "assert_visible", on = { accessibility_label = "Increment", traits = ["button"] } },
  { action = "assert_visible", on_text = "0", on_below = "Counter" },
  { action = "assert_visible", on_text = "Submit", on_enabled = true },
  { action = "assert_visible", on_accessibility_label = "Increment", on_enabled = true },
  { action = "assert_not_visible", on_text = "GOLEM Test B" },

  # Below the fold — scroll down once. Subsequent asserts in the
  # same section don't need auto_scroll because the viewport
  # already overlaps the target.
  { action = "assert_visible", on_text = "Enter email", auto_scroll = true },
  { action = "assert_visible", on_text = "Enter email", on_enabled = true },

  { action = "assert_visible", on_text = "Dark Mode", auto_scroll = true },
  { action = "assert_visible", on_text = "Dark Mode", on_enabled = true },
  { action = "assert_visible", on_accessibility_label = "agree-checkbox", on_checked = false, auto_scroll = true },
  { action = "tap", on_text = "I agree" },
  { action = "assert_visible", on_accessibility_label = "agree-checkbox", on_checked = true },

  # Scroll List items — further down. Auto_scroll handles the
  # inner-scrollable too. We auto_scroll both because the engine's
  # "found" criterion is partial intersection, so the first item
  # can land right at the viewport edge with siblings out of view
  # on taller devices (Pixel 8 Pro API 36 reproduced this).
  { action = "assert_visible", on_text = "Item 0", auto_scroll = true },
  { action = "assert_visible", on_text = "Item 3", auto_scroll = true },
]
