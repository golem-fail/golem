[flow]
name = "Android multi-app test"
tags = ["android", "multi-app"]

[[flow.apps]]
name = "app"
bundle = "com.golem.test"

[[flow.apps.devices]]
os = "android:latest"
type = "phone"

[[flow.apps]]
name = "app-b"
bundle = "com.golem.test-b"

[[flow.apps.devices]]
os = "android:latest"
type = "phone"

[[block]]
name = "switch_between_apps"
steps = [
  # Launch the primary app
  { action = "launch", app = "com.golem.test" },
  { action = "wait", accessibility_id = "submit-button", timeout = 10000 },

  # Interact with the primary app
  { action = "tap", accessibility_id = "increment-button" },
  { action = "tap", accessibility_id = "increment-button" },
  { action = "tap", accessibility_id = "increment-button" },
  { action = "assert_text", accessibility_id = "counter-display", text = "3" },

  # Switch to the companion app
  { action = "launch", app = "com.golem.test-b" },
  { action = "wait", accessibility_id = "app-b-title", timeout = 10000 },
  { action = "assert_visible", accessibility_id = "shared-data-display" },
  { action = "assert_visible", accessibility_id = "refresh-button" },
  { action = "assert_text", accessibility_id = "status-label", text = "Ready" },

  # Tap refresh in companion app
  { action = "tap", accessibility_id = "refresh-button" },

  # Switch back to the primary app
  { action = "launch", app = "com.golem.test" },
  { action = "wait", accessibility_id = "counter-display", timeout = 10000 },

  # Verify primary app state is intact
  { action = "assert_text", accessibility_id = "counter-display", text = "3" },

  # Stop the companion app
  { action = "stop", app = "com.golem.test-b" },
]
