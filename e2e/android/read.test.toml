[flow]
name = "Android read element text test"
tags = ["android", "data", "variables"]

[[flow.apps]]
name = "app"
bundle = "com.golem.test"

[[flow.apps.devices]]
os = "android:latest"
type = "phone"

[[block]]
name = "read_and_save"
steps = [
  { action = "launch", app = "com.golem.test" },

  # Read the initial counter value and save it to a variable
  { action = "read", accessibility_id = "counter-display", save_to = "initial_count" },

  # Increment the counter twice
  { action = "tap", accessibility_id = "increment-button" },
  { action = "tap", accessibility_id = "increment-button" },

  # Read the updated counter value
  { action = "read", accessibility_id = "counter-display", save_to = "updated_count" },

  # Read the orientation label
  { action = "read", accessibility_id = "orientation-label", save_to = "device_orientation" },

  # Read the theme label
  { action = "read", accessibility_id = "theme-label", save_to = "current_theme" },

  # Read text from a list item
  { action = "read", accessibility_id = "list-item-0", save_to = "first_item_text" },

  # Verify the counter was updated correctly
  { action = "assert_text", accessibility_id = "counter-display", text = "2" },
]
