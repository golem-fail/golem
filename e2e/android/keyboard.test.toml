[flow]
name = "Android keyboard test"
tags = ["android", "interaction", "keyboard"]

[[flow.apps]]
name = "app"
bundle = "com.golem.test"

[[flow.apps.devices]]
os = "android:latest"
type = "phone"

[[block]]
name = "keyboard_management"
steps = [
  { action = "launch", app = "com.golem.test" },

  # Tap a text field to bring up the keyboard
  { action = "tap", accessibility_id = "email-input" },

  # Type some text (keyboard should be visible)
  { action = "type", accessibility_id = "email-input", text = "test@example.com" },

  # Dismiss the keyboard
  { action = "hide_keyboard" },

  # Tap another text field to bring the keyboard back
  { action = "tap", accessibility_id = "search-input" },
  { action = "type", accessibility_id = "search-input", text = "search query" },

  # Dismiss again using the Android back button
  { action = "press", button = "back" },

  # Verify the typed text persisted after keyboard dismissal
  { action = "assert_text", accessibility_id = "email-input", text = "test@example.com" },
  { action = "assert_text", accessibility_id = "search-input", text = "search query" },
]
