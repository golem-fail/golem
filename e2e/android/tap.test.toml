[flow]
name = "Android tap test"
tags = ["android", "interaction", "smoke"]

[[flow.apps]]
name = "app"
bundle = "com.golem.test"

[[flow.apps.devices]]
os = "android:latest"
type = "phone"

[[block]]
name = "tap_tests"
steps = [
  { action = "launch", app = "com.golem.test" },
  { action = "wait", id = "submit-button", timeout = 10000 },
  { action = "tap", id = "submit-button" },
  { action = "tap", id = "duplicate-button-1" },
  { action = "tap", id = "increment-button" },
  { action = "tap", id = "increment-button" },
  { action = "tap", id = "decrement-button" },
  { action = "assert_visible", id = "counter-display" },
]
