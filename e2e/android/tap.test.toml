[flow]
name = "Android tap test"
tags = ["android", "interaction", "smoke"]

[[flow.apps]]
name = "app"
bundle = "com.golem.test"

[[flow.apps.devices]]
os = "android:latest"
type = "phone"

[[block]]
name = "tap_tests"
steps = [
  { action = "launch", app = "com.golem.test" },
  { action = "wait", text = "Submit", timeout = 10000 },
  { action = "tap", text = "Submit" },
  { action = "tap", text = "Action", index = 0 },
  { action = "tap", text = "Increment" },
  { action = "tap", text = "Increment" },
  { action = "tap", text = "Decrement" },
  { action = "assert_visible", text = "Counter" },
]
