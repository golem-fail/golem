[flow]
name = "assert_visible and assert_not_visible"
tags = ["cross-platform", "synchronization"]

[[flow.apps]]
name = "app"
[[flow.apps.devices]]
os = ["ios:latest", "android:latest"]
type = "phone"

[[block]]
name = "assert_initial_elements"
steps = [
  { action = "assert_visible", on_text = "Submit" },
  { action = "assert_visible", on_text = "Counter" },
]

# `Show Delayed` lives in the Delayed Element section, well below the
# fold. Use the menu to jump there directly — much faster than
# auto_scroll past inner scrollables on iOS WebView.
[[block]]
name = "menu_nav_and_tap"
steps = [
  { action = "tap", on_accessibility_label = "menu-toggle" },
  { action = "tap", on_accessibility_label = "goto-delayed-element" },
  { action = "tap", on_text = "Show Delayed" },

  # After tapping, wait for delayed text to appear (~3s). The default
  # 10s assert window can fall short under sweep load — the test-app
  # delay is intentional and not a flake, so explicit headroom.
  { action = "assert_visible", on_text = "Delayed Text", timeout = 15000 },

  # Wait for it to disappear (~3s after appearing).
  { action = "assert_not_visible", on_text = "Delayed Text", timeout = 15000 },
]
