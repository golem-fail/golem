[flow]
name = "App lifecycle test"
tags = ["cross-platform", "lifecycle"]

[[flow.apps]]
name = "app"
[[flow.apps.devices]]
os = ["ios:latest", "android:latest"]
type = "phone"

[[block]]
name = "launch_and_stop"
steps = [
  # Verify the app is running by checking for a known element
  { action = "assert_visible", on_text = "Submit" },
  { action = "assert_visible", on_text = "Counter" },

  # Interact to set some state
  { action = "tap", on_text = "+" },
  { action = "assert_visible", on_text = "1", on_below = "Counter" },

  # Stop the app
  { action = "stop", app = "app" },

  # Re-launch the app (state may be reset)
  { action = "launch", app = "app" },

  # Verify the app is running again
  { action = "assert_visible", on_text = "Submit" },
  { action = "assert_visible", on_text = "Counter" },
]
