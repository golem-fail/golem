[flow]
name = "Gesture test"
tags = ["cross-platform", "interaction", "gesture"]

[[flow.apps]]
name = "app"
[[flow.apps.devices]]
os = ["ios:latest", "android:latest"]
type = "phone"

# Scroll to gesture target and verify initial state
[[block]]
name = "find_gesture_target"
steps = [
  { action = "tap", on_text = "Reset Gesture", auto_scroll = true },
  # Reset Gesture sits at the bottom of the gesture widget — after auto_scroll
  # brings it into view, the state labels are off-screen on some devices.
  # Each label sits at a different y inside the widget, so each assert
  # needs its own auto_scroll.
  { action = "assert_visible", on_text = "Not zoomed", auto_scroll = true },
  { action = "assert_visible", on_text = "Grid: 000-000-000", auto_scroll = true },
  { action = "assert_visible", on_text = "*Max: 0", auto_scroll = true },
]

# Pinch centered on the gesture area
[[block]]
name = "pinch_zoom"
steps = [
  { action = "pinch", on = { accessibility_label = "gesture-area" }, scale = 2.0 },
  { action = "assert_visible", on_text = "Zoomed" },
  { action = "assert_not_visible", on_text = "Grid: 000-000-000" },
  { action = "assert_visible", on_text = "*Max: 2" },
]

# L-shaped continuous path through the gesture area
[[block]]
name = "continuous_path"
steps = [
  { action = "tap", on_text = "Reset Gesture", auto_scroll = true },
  { action = "assert_visible", on_text = "Grid: 000-000-000" },
  { action = "swipe", points = [
    { accessibility_label = "gesture-area", x = "-33%", y = "0" },
    { accessibility_label = "gesture-area", x = "0", y = "0" },
    { accessibility_label = "gesture-area", x = "33%", y = "0" },
    { accessibility_label = "gesture-area", x = "33%", y = "33%" },
  ], duration = 800 },
  # L-shape: horizontal across middle row, then down right column
  { action = "assert_visible", on_text = "Grid: 000-111-001" },
  { action = "assert_visible", on_text = "*Max: 1" },
]

# Rotate 90° clockwise
[[block]]
name = "rotate_cw"
steps = [
  { action = "tap", on_text = "Reset Gesture", auto_scroll = true },
  { action = "assert_visible", on_text = "Rot: 0" },
  { action = "rotate", on = { accessibility_label = "gesture-area" }, rotation = 90.0 },
  { action = "assert_visible", on_text = "Rot: 90 CW" },
  { action = "assert_visible", on_text = "*Max: 2" },
]

# Rotate 270° counter-clockwise
[[block]]
name = "rotate_ccw"
steps = [
  { action = "tap", on_text = "Reset Gesture", auto_scroll = true },
  { action = "assert_visible", on_text = "Rot: 0" },
  { action = "rotate", on = { accessibility_label = "gesture-area" }, rotation = -270.0 },
  { action = "assert_visible", on_text = "Rot: -270 CCW" },
  { action = "assert_visible", on_text = "*Max: 2" },
]

# Two-finger parallel pan — exercises the `gesture` action's arbitrary
# multi-finger `fingers` paths (#78), the one gesture primitive the pinch/swipe/
# rotate blocks above don't reach. Distinct from pinch (fingers converge) and
# rotate (fingers orbit): both fingers sweep left→right in parallel, one along
# the top row, one along the bottom. `Max: 2` is the load-bearing assertion
# (multi-finger); the grid corroborates that each finger filled its own row.
[[block]]
name = "two_finger_pan"
steps = [
  { action = "tap", on_text = "Reset Gesture", auto_scroll = true },
  { action = "assert_visible", on_text = "Grid: 000-000-000" },
  { action = "gesture", duration = 800, fingers = [
    { points = [
      { accessibility_label = "gesture-area", x = "-33%", y = "-33%" },
      { accessibility_label = "gesture-area", x = "0", y = "-33%" },
      { accessibility_label = "gesture-area", x = "33%", y = "-33%" },
    ] },
    { points = [
      { accessibility_label = "gesture-area", x = "-33%", y = "33%" },
      { accessibility_label = "gesture-area", x = "0", y = "33%" },
      { accessibility_label = "gesture-area", x = "33%", y = "33%" },
    ] },
  ] },
  { action = "assert_visible", on_text = "*Max: 2" },
  { action = "assert_visible", on_text = "Grid: 111-000-111" },
]
