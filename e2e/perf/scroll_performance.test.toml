[flow]
name = "Scroll performance"
tags = ["perf", "scroll", "gesture", "latency"]

[[flow.apps]]
name = "app"
[[flow.apps.devices]]
os = ["ios:latest", "android:latest"]
type = "phone"

[[block]]
name = "launch_and_wait"
steps = [
  # Launch the app and jump to the Scroll List section. Menu nav so the
  # flow doesn't waste swipe budget getting to the section under test.
  { action = "launch", app = "fail.golem.test" },
  { action = "tap", on_accessibility_label = "menu-toggle" },
  { action = "tap", on_accessibility_label = "goto-scroll-list" },
  { action = "assert_visible", on_text = "Scroll List" },
  { action = "assert_visible", on_text = "Item 0" },
  { action = "screenshot" },
]

# `Scroll List` is an inner scrollable (max-height:300px overflow-y:auto)
# so the gesture has to originate inside the list — `scroll` with
# `within = { below = "Scroll List" }` constrains the swipe origin to
# the list's bounding box. Page-level swipes scroll the outer page,
# which has nothing to scroll, and never reach the inner list.

[[block]]
name = "scroll_down_to_middle"
steps = [
  { action = "scroll", direction = "down", on_text = "Item 15", within = { below = "Scroll List" } },
  { action = "scroll", direction = "down", on_text = "Item 25", within = { below = "Scroll List" } },
]

[[block]]
name = "scroll_down_to_bottom"
steps = [
  { action = "scroll", direction = "down", on_text = "Item 40", within = { below = "Scroll List" } },
  { action = "scroll", direction = "down", on_text = "Item 49", within = { below = "Scroll List" } },
  { action = "screenshot" },
]

[[block]]
name = "scroll_back_to_top"
steps = [
  { action = "scroll", direction = "up", on_text = "Item 0", within = { below = "Scroll List" } },
]

[[block]]
name = "carousel_scroll_forward"
steps = [
  # Jump to the Carousel section.
  { action = "tap", on_accessibility_label = "menu-toggle" },
  { action = "tap", on_accessibility_label = "goto-carousel" },
  { action = "assert_visible", on_text = "Carousel" },
  { action = "assert_visible", on_text = "Card 0" },

  # Carousel is also an inner horizontal scroller — same `within` story.
  # Forward direction is `right` (finger drags right-to-left, content
  # scrolls left, later cards come into view from the right). Using
  # `left` triggers the scroll engine's stall-reverse logic since the
  # initial swipe direction is wrong, wasting budget.
  { action = "scroll", direction = "right", on_text = "Card 2", within = { below = "Carousel" } },
  { action = "scroll", direction = "right", on_text = "Card 4", within = { below = "Carousel" } },
  { action = "scroll", direction = "right", on_text = "Card 6", within = { below = "Carousel" } },
  { action = "scroll", direction = "right", on_text = "Card 9", within = { below = "Carousel" } },
]

[[block]]
name = "carousel_scroll_back"
steps = [
  # Back direction is `left` — opposite of forward. Card 3 is enough
  # to prove the reverse path; going all the way back to Card 0 from
  # Card 9 hits scroll-snap stalls that don't reproduce the original
  # bug we're protecting against.
  { action = "scroll", direction = "left", on_text = "Card 3", within = { below = "Carousel" } },
  { action = "screenshot" },
]
