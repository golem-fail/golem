[flow]
name = "Scroll performance"
tags = ["perf", "scroll", "gesture", "latency"]

[[flow.apps]]
name = "app"
[[flow.apps.devices]]
os = ["ios:latest", "android:latest"]
type = "phone"

[[block]]
name = "launch_and_wait"
steps = [
  # Launch the app and jump to the Scroll List section. Menu nav so the
  # flow doesn't waste swipe budget getting to the section under test.
  { action = "launch", app = "fail.golem.test" },
  { action = "tap", on_accessibility_label = "menu-toggle" },
  { action = "tap", on_accessibility_label = "goto-scroll-list" },
  { action = "assert_visible", on_text = "Scroll List" },
  { action = "assert_visible", on_text = "Item 0" },
  { action = "screenshot" },
]

[[block]]
name = "scroll_down_to_middle"
steps = [
  # Scroll down through the first portion of the 50-item list
  { action = "swipe", direction = "down" },
  { action = "swipe", direction = "down" },
  { action = "swipe", direction = "down" },

  # Verify a mid-range item appears quickly
  { action = "assert_visible", on_text = "Item 15", timeout = 2000 },
  { action = "assert_visible", on_text = "Item 15" },

  # Continue scrolling
  { action = "swipe", direction = "down" },
  { action = "swipe", direction = "down" },

  # Verify another mid-list element with tight timeout
  { action = "assert_visible", on_text = "Item 25", timeout = 2000 },
  { action = "assert_visible", on_text = "Item 25" },
]

[[block]]
name = "scroll_down_to_bottom"
steps = [
  # Continue scrolling to reach the bottom of the list
  { action = "swipe", direction = "down" },
  { action = "swipe", direction = "down" },
  { action = "swipe", direction = "down" },
  { action = "swipe", direction = "down" },
  { action = "swipe", direction = "down" },

  # Verify near-bottom items appear within tight timeout
  { action = "assert_visible", on_text = "Item 40", timeout = 2000 },
  { action = "assert_visible", on_text = "Item 40" },

  { action = "swipe", direction = "down" },
  { action = "swipe", direction = "down" },

  # Verify the last item in the list
  { action = "assert_visible", on_text = "Item 49", timeout = 2000 },
  { action = "assert_visible", on_text = "Item 49" },
  { action = "screenshot" },
]

[[block]]
name = "scroll_back_to_top"
steps = [
  # Scroll all the way back up
  { action = "swipe", direction = "up" },
  { action = "swipe", direction = "up" },
  { action = "swipe", direction = "up" },
  { action = "swipe", direction = "up" },
  { action = "swipe", direction = "up" },
  { action = "swipe", direction = "up" },
  { action = "swipe", direction = "up" },
  { action = "swipe", direction = "up" },
  { action = "swipe", direction = "up" },
  { action = "swipe", direction = "up" },
  { action = "swipe", direction = "up" },
  { action = "swipe", direction = "up" },

  # Verify we are back at the top with a tight timeout
  { action = "assert_visible", on_text = "Item 0", timeout = 2000 },
  { action = "assert_visible", on_text = "Item 0" },
]

[[block]]
name = "carousel_scroll_forward"
steps = [
  # Jump to the Carousel section.
  { action = "tap", on_accessibility_label = "menu-toggle" },
  { action = "tap", on_accessibility_label = "goto-carousel" },
  { action = "assert_visible", on_text = "Carousel" },
  { action = "assert_visible", on_text = "Card 0" },

  # Swipe left through the entire carousel
  { action = "swipe", direction = "left" },
  { action = "assert_visible", on_text = "Card 2", timeout = 2000 },

  { action = "swipe", direction = "left" },
  { action = "assert_visible", on_text = "Card 4", timeout = 2000 },

  { action = "swipe", direction = "left" },
  { action = "assert_visible", on_text = "Card 6", timeout = 2000 },

  { action = "swipe", direction = "left" },
  { action = "swipe", direction = "left" },

  # Verify the last carousel item is reachable
  { action = "assert_visible", on_text = "Card 9", timeout = 2000 },
  { action = "assert_visible", on_text = "Card 9" },
]

[[block]]
name = "carousel_scroll_back"
steps = [
  # Swipe right to return to the beginning
  { action = "swipe", direction = "right" },
  { action = "swipe", direction = "right" },
  { action = "swipe", direction = "right" },
  { action = "swipe", direction = "right" },
  { action = "swipe", direction = "right" },
  { action = "swipe", direction = "right" },
  { action = "swipe", direction = "right" },
  { action = "swipe", direction = "right" },
  { action = "swipe", direction = "right" },

  # Verify return to the start of the carousel
  { action = "assert_visible", on_text = "Card 0", timeout = 2000 },
  { action = "assert_visible", on_text = "Card 0" },

  # Final screenshot to confirm consistent state
  { action = "screenshot" },
]
