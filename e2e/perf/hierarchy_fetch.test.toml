[flow]
name = "Hierarchy fetch latency"
tags = ["perf", "hierarchy", "latency"]

[[flow.apps]]
name = "app"
bundle = "com.golem.test"

[[flow.apps.devices]]
os = "ios:latest"
type = "phone"

[[flow.apps.devices]]
os = "android:latest"
type = "phone"

[[block]]
name = "launch_and_wait"
steps = [
  # Launch the app and wait for initial load
  { action = "launch", app = "com.golem.test" },
  { action = "wait", accessibility_id = "submit-button", timeout = 10000 },
  { action = "screenshot" },
]

[[block]]
name = "read_top_of_tree"
steps = [
  # Read elements near the top of the hierarchy
  # Each read exercises a full hierarchy fetch + element find + text extraction
  { action = "read", accessibility_id = "counter-display", save_to = "counter_val" },
  { action = "wait", accessibility_id = "counter-display", timeout = 2000 },
  { action = "read", accessibility_id = "email-input", save_to = "email_val" },
  { action = "wait", accessibility_id = "email-input", timeout = 2000 },
  { action = "read", accessibility_id = "password-input", save_to = "password_val" },
  { action = "wait", accessibility_id = "password-input", timeout = 2000 },
  { action = "read", accessibility_id = "search-input", save_to = "search_val" },
  { action = "wait", accessibility_id = "search-input", timeout = 2000 },
]

[[block]]
name = "read_buttons"
steps = [
  # Read button elements — exercises finding interactive elements in the tree
  { action = "read", accessibility_id = "submit-button", save_to = "submit_val" },
  { action = "wait", accessibility_id = "submit-button", timeout = 2000 },
  { action = "read", accessibility_id = "increment-button", save_to = "inc_val" },
  { action = "wait", accessibility_id = "increment-button", timeout = 2000 },
  { action = "read", accessibility_id = "decrement-button", save_to = "dec_val" },
  { action = "wait", accessibility_id = "decrement-button", timeout = 2000 },
]

[[block]]
name = "read_list_items_spread"
steps = [
  # Read list items from different positions — top, early, and mid-list
  # This stresses the hierarchy endpoint with elements at varying depths
  { action = "read", accessibility_id = "list-item-0", save_to = "item_0" },
  { action = "wait", accessibility_id = "list-item-0", timeout = 2000 },
  { action = "read", accessibility_id = "list-item-1", save_to = "item_1" },
  { action = "wait", accessibility_id = "list-item-1", timeout = 2000 },
  { action = "read", accessibility_id = "list-item-2", save_to = "item_2" },
  { action = "wait", accessibility_id = "list-item-2", timeout = 2000 },
  { action = "read", accessibility_id = "list-item-3", save_to = "item_3" },
  { action = "wait", accessibility_id = "list-item-3", timeout = 2000 },
  { action = "read", accessibility_id = "list-item-4", save_to = "item_4" },
  { action = "wait", accessibility_id = "list-item-4", timeout = 2000 },
]

[[block]]
name = "read_carousel_items"
steps = [
  # Read carousel items to exercise a different subtree
  { action = "read", accessibility_id = "carousel-item-0", save_to = "carousel_0" },
  { action = "wait", accessibility_id = "carousel-item-0", timeout = 2000 },
  { action = "read", accessibility_id = "carousel-item-1", save_to = "carousel_1" },
  { action = "wait", accessibility_id = "carousel-item-1", timeout = 2000 },
  { action = "read", accessibility_id = "carousel-item-2", save_to = "carousel_2" },
  { action = "wait", accessibility_id = "carousel-item-2", timeout = 2000 },

  # Final screenshot to capture end state
  { action = "screenshot" },
]
