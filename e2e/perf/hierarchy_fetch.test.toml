[flow]
name = "Hierarchy fetch latency"
tags = ["perf", "hierarchy", "latency"]

[[flow.apps]]
name = "app"
[[flow.apps.devices]]
os = ["ios:latest", "android:latest"]
type = "phone"

[[block]]
name = "launch_and_wait"
steps = [
  # Launch the app and wait for initial load
  { action = "launch", app = "fail.golem.test" },
  { action = "assert_visible", on_text = "Submit" },
  { action = "screenshot" },
]

[[block]]
name = "read_top_of_tree"
steps = [
  # Read elements near the top of the hierarchy
  # Each read exercises a full hierarchy fetch + element find + text extraction
  { action = "read", on_below = "Counter", on_index = 0, save_to = "counter_val" },
  { action = "assert_visible", on_text = "Counter", timeout = 5000 },
  { action = "read", on_text = "Enter email", save_to = "email_val" },
  { action = "assert_visible", on_text = "Enter email", timeout = 5000 },
  { action = "read", on_text = "Password", save_to = "password_val" },
  { action = "assert_visible", on_text = "Password", timeout = 5000 },
  { action = "read", on_text = "Search", save_to = "search_val" },
  { action = "assert_visible", on_text = "Search", timeout = 5000 },
]

[[block]]
name = "read_buttons"
steps = [
  # Read button elements — exercises finding interactive elements in the tree
  { action = "read", on_text = "Submit", save_to = "submit_val" },
  { action = "assert_visible", on_text = "Submit", timeout = 5000 },
  { action = "read", on_text = "+", save_to = "inc_val" },
  { action = "assert_visible", on_text = "+", timeout = 5000 },
  { action = "read", on_text = "-", save_to = "dec_val" },
  { action = "assert_visible", on_text = "-", timeout = 5000 },
]

[[block]]
name = "read_list_items_spread"
steps = [
  # Jump to Scroll List so the items are in view.
  { action = "tap", on_accessibility_label = "menu-toggle" },
  { action = "tap", on_accessibility_label = "goto-scroll-list" },

  # Read list items from different positions — top, early, and mid-list
  # This stresses the hierarchy endpoint with elements at varying depths
  { action = "read", on_text = "Item 0", save_to = "item_0" },
  { action = "assert_visible", on_text = "Item 0", timeout = 5000 },
  { action = "read", on_text = "Item 1", save_to = "item_1" },
  { action = "assert_visible", on_text = "Item 1", timeout = 5000 },
  { action = "read", on_text = "Item 2", save_to = "item_2" },
  { action = "assert_visible", on_text = "Item 2", timeout = 5000 },
  { action = "read", on_text = "Item 3", save_to = "item_3" },
  { action = "assert_visible", on_text = "Item 3", timeout = 5000 },
  { action = "read", on_text = "Item 4", save_to = "item_4" },
  { action = "assert_visible", on_text = "Item 4", timeout = 5000 },
]

[[block]]
name = "read_carousel_items"
steps = [
  # Jump to Carousel.
  { action = "tap", on_accessibility_label = "menu-toggle" },
  { action = "tap", on_accessibility_label = "goto-carousel" },

  # Read the first carousel item (only Card 0 is in view; later cards
  # require a swipe-left which is out of scope for a fetch-latency test).
  { action = "read", on_text = "Card 0", save_to = "carousel_0" },
  { action = "assert_visible", on_text = "Card 0", timeout = 5000 },

  # Final screenshot to capture end state
  { action = "screenshot" },
]
