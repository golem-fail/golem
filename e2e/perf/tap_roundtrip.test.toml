[flow]
name = "Tap round-trip latency"
tags = ["perf", "tap", "roundtrip", "latency"]

[[flow.apps]]
name = "app"
bundle = "com.golem.test"

[[flow.apps.devices]]
os = "ios:latest"
type = "phone"

[[flow.apps.devices]]
os = "android:latest"
type = "phone"

[[block]]
name = "launch_and_verify_initial"
steps = [
  # Launch the app and wait for initial load
  { action = "launch", app = "com.golem.test" },
  { action = "wait", text = "Counter", timeout = 10000 },

  # Verify counter starts at zero
  { action = "assert_visible", text = "0", below = "Counter", element_type = "text" },
  { action = "screenshot" },
]

[[block]]
name = "increment_roundtrip_1_to_5"
steps = [
  # Tap 1: tap increment, assert counter updated within 2s
  { action = "tap", text = "Increment" },
  { action = "wait", text = "Counter", timeout = 2000 },
  { action = "assert_visible", text = "1", below = "Counter", element_type = "text" },

  # Tap 2
  { action = "tap", text = "Increment" },
  { action = "wait", text = "Counter", timeout = 2000 },
  { action = "assert_visible", text = "2", below = "Counter", element_type = "text" },

  # Tap 3
  { action = "tap", text = "Increment" },
  { action = "wait", text = "Counter", timeout = 2000 },
  { action = "assert_visible", text = "3", below = "Counter", element_type = "text" },

  # Tap 4
  { action = "tap", text = "Increment" },
  { action = "wait", text = "Counter", timeout = 2000 },
  { action = "assert_visible", text = "4", below = "Counter", element_type = "text" },

  # Tap 5
  { action = "tap", text = "Increment" },
  { action = "wait", text = "Counter", timeout = 2000 },
  { action = "assert_visible", text = "5", below = "Counter", element_type = "text" },
]

[[block]]
name = "increment_roundtrip_6_to_10"
steps = [
  # Tap 6
  { action = "tap", text = "Increment" },
  { action = "wait", text = "Counter", timeout = 2000 },
  { action = "assert_visible", text = "6", below = "Counter", element_type = "text" },

  # Tap 7
  { action = "tap", text = "Increment" },
  { action = "wait", text = "Counter", timeout = 2000 },
  { action = "assert_visible", text = "7", below = "Counter", element_type = "text" },

  # Tap 8
  { action = "tap", text = "Increment" },
  { action = "wait", text = "Counter", timeout = 2000 },
  { action = "assert_visible", text = "8", below = "Counter", element_type = "text" },

  # Tap 9
  { action = "tap", text = "Increment" },
  { action = "wait", text = "Counter", timeout = 2000 },
  { action = "assert_visible", text = "9", below = "Counter", element_type = "text" },

  # Tap 10
  { action = "tap", text = "Increment" },
  { action = "wait", text = "Counter", timeout = 2000 },
  { action = "assert_visible", text = "10", below = "Counter", element_type = "text" },

  # Read the final counter value
  { action = "read", below = "Counter", element_type = "text", save_to = "final_count" },
  { action = "screenshot" },
]

[[block]]
name = "decrement_roundtrip"
steps = [
  # Rapidly decrement back down to verify round-trip in the other direction
  { action = "tap", text = "Decrement" },
  { action = "wait", text = "Counter", timeout = 2000 },
  { action = "assert_visible", text = "9", below = "Counter", element_type = "text" },

  { action = "tap", text = "Decrement" },
  { action = "wait", text = "Counter", timeout = 2000 },
  { action = "assert_visible", text = "8", below = "Counter", element_type = "text" },

  { action = "tap", text = "Decrement" },
  { action = "wait", text = "Counter", timeout = 2000 },
  { action = "assert_visible", text = "7", below = "Counter", element_type = "text" },

  { action = "tap", text = "Decrement" },
  { action = "wait", text = "Counter", timeout = 2000 },
  { action = "assert_visible", text = "6", below = "Counter", element_type = "text" },

  { action = "tap", text = "Decrement" },
  { action = "wait", text = "Counter", timeout = 2000 },
  { action = "assert_visible", text = "5", below = "Counter", element_type = "text" },

  # Final read to confirm state
  { action = "read", below = "Counter", element_type = "text", save_to = "decremented_count" },
  { action = "screenshot" },
]
