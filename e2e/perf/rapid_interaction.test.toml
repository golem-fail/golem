[flow]
name = "Rapid interaction stress test"
tags = ["perf", "stress", "rapid", "interaction"]

[[flow.apps]]
name = "app"
bundle = "com.golem.test"

[[flow.apps.devices]]
os = "ios:latest"
type = "phone"

[[flow.apps.devices]]
os = "android:latest"
type = "phone"

[[block]]
name = "launch_and_wait"
steps = [
  # Launch the app and wait for initial load
  { action = "launch", app = "com.golem.test" },
  { action = "wait", text = "Submit", timeout = 10000 },
]

[[block]]
name = "rapid_form_fill"
steps = [
  # Rapidly type into all input fields in quick succession
  { action = "type", input = "Enter email", text = "perf@golem.com" },
  { action = "wait", text = "Enter email", timeout = 2000 },
  { action = "assert_visible", text = "perf@golem.com" },

  { action = "type", input = "Password", text = "Str0ngP@ss!" },
  { action = "wait", text = "Password", timeout = 2000 },

  { action = "type", input = "Search", text = "rapid test query" },
  { action = "wait", text = "Search", timeout = 2000 },
  { action = "assert_visible", text = "rapid test query" },

  # Hide keyboard between interactions
  { action = "hide_keyboard" },
]

[[block]]
name = "rapid_counter_burst"
steps = [
  # Rapidly tap increment button 5 times without waiting between taps
  { action = "tap", text = "Increment" },
  { action = "tap", text = "Increment" },
  { action = "tap", text = "Increment" },
  { action = "tap", text = "Increment" },
  { action = "tap", text = "Increment" },

  # Now verify the counter reached the expected value
  { action = "wait", text = "Counter", timeout = 2000 },
  { action = "assert_visible", text = "5", below = "Counter", element_type = "text" },

  # Rapidly decrement 3 times
  { action = "tap", text = "Decrement" },
  { action = "tap", text = "Decrement" },
  { action = "tap", text = "Decrement" },

  # Verify counter after burst decrement
  { action = "wait", text = "Counter", timeout = 2000 },
  { action = "assert_visible", text = "2", below = "Counter", element_type = "text" },
]

[[block]]
name = "rapid_mixed_actions"
steps = [
  # Mix taps, reads, and asserts in rapid succession
  { action = "tap", text = "Increment" },
  { action = "read", below = "Counter", element_type = "text", save_to = "mid_count_1" },
  { action = "assert_visible", text = "Submit" },
  { action = "tap", text = "Increment" },
  { action = "read", below = "Counter", element_type = "text", save_to = "mid_count_2" },
  { action = "assert_visible", text = "Enter email" },
  { action = "tap", text = "Increment" },
  { action = "read", below = "Counter", element_type = "text", save_to = "mid_count_3" },
  { action = "assert_visible", text = "scroll-list" },
  { action = "tap", text = "Increment" },
  { action = "read", below = "Counter", element_type = "text", save_to = "mid_count_4" },
  { action = "assert_visible", text = "carousel" },
]

[[block]]
name = "rapid_read_burst"
steps = [
  # Burst-read many elements in rapid succession
  { action = "read", below = "Counter", element_type = "text", save_to = "r1" },
  { action = "read", text = "Enter email", save_to = "r2" },
  { action = "read", text = "Search", save_to = "r3" },
  { action = "read", text = "Item 0", save_to = "r4" },
  { action = "read", text = "Item 1", save_to = "r5" },
  { action = "read", text = "Item 2", save_to = "r6" },
  { action = "read", text = "carousel-item-0", save_to = "r7" },
  { action = "read", text = "carousel-item-1", save_to = "r8" },
  { action = "read", text = "Submit", save_to = "r9" },
  { action = "read", text = "Increment", save_to = "r10" },
]

[[block]]
name = "rapid_visibility_burst"
steps = [
  # Burst assert_visible on many elements in rapid succession
  { action = "assert_visible", text = "Submit" },
  { action = "assert_visible", text = "Increment" },
  { action = "assert_visible", text = "Decrement" },
  { action = "assert_visible", text = "Counter" },
  { action = "assert_visible", text = "Enter email" },
  { action = "assert_visible", text = "Password" },
  { action = "assert_visible", text = "Search" },
  { action = "assert_visible", text = "scroll-list" },
  { action = "assert_visible", text = "carousel" },
  { action = "assert_visible", text = "list-item-0" },
  { action = "assert_visible", text = "list-item-1" },
  { action = "assert_visible", text = "list-item-2" },
  { action = "assert_visible", text = "carousel-item-0" },
  { action = "assert_visible", text = "carousel-item-1" },

  # Final screenshot to verify app is still in a consistent state
  { action = "screenshot" },
]
