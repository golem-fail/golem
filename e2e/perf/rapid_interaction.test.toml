[flow]
name = "Rapid interaction stress test"
tags = ["perf", "stress", "rapid", "interaction"]

[[flow.apps]]
name = "app"
bundle = "com.golem.test"

[[flow.apps.devices]]
os = "ios:latest"
type = "phone"

[[flow.apps.devices]]
os = "android:latest"
type = "phone"

[[block]]
name = "launch_and_wait"
steps = [
  # Launch the app and wait for initial load
  { action = "launch", app = "com.golem.test" },
  { action = "wait", id = "submit-button", timeout = 10000 },
]

[[block]]
name = "rapid_form_fill"
steps = [
  # Rapidly type into all input fields in quick succession
  { action = "type", id = "email-input", text = "perf@golem.com" },
  { action = "wait", id = "email-input", timeout = 2000 },
  { action = "assert_text", id = "email-input", text = "perf@golem.com" },

  { action = "type", id = "password-input", text = "Str0ngP@ss!" },
  { action = "wait", id = "password-input", timeout = 2000 },

  { action = "type", id = "search-input", text = "rapid test query" },
  { action = "wait", id = "search-input", timeout = 2000 },
  { action = "assert_text", id = "search-input", text = "rapid test query" },

  # Hide keyboard between interactions
  { action = "hide_keyboard" },
]

[[block]]
name = "rapid_counter_burst"
steps = [
  # Rapidly tap increment button 5 times without waiting between taps
  { action = "tap", id = "increment-button" },
  { action = "tap", id = "increment-button" },
  { action = "tap", id = "increment-button" },
  { action = "tap", id = "increment-button" },
  { action = "tap", id = "increment-button" },

  # Now verify the counter reached the expected value
  { action = "wait", id = "counter-display", timeout = 2000 },
  { action = "assert_text", id = "counter-display", text = "5" },

  # Rapidly decrement 3 times
  { action = "tap", id = "decrement-button" },
  { action = "tap", id = "decrement-button" },
  { action = "tap", id = "decrement-button" },

  # Verify counter after burst decrement
  { action = "wait", id = "counter-display", timeout = 2000 },
  { action = "assert_text", id = "counter-display", text = "2" },
]

[[block]]
name = "rapid_mixed_actions"
steps = [
  # Mix taps, reads, and asserts in rapid succession
  { action = "tap", id = "increment-button" },
  { action = "read", id = "counter-display", save_to = "mid_count_1" },
  { action = "assert_visible", id = "submit-button" },
  { action = "tap", id = "increment-button" },
  { action = "read", id = "counter-display", save_to = "mid_count_2" },
  { action = "assert_visible", id = "email-input" },
  { action = "tap", id = "increment-button" },
  { action = "read", id = "counter-display", save_to = "mid_count_3" },
  { action = "assert_visible", id = "scroll-list" },
  { action = "tap", id = "increment-button" },
  { action = "read", id = "counter-display", save_to = "mid_count_4" },
  { action = "assert_visible", id = "carousel" },
]

[[block]]
name = "rapid_read_burst"
steps = [
  # Burst-read many elements in rapid succession
  { action = "read", id = "counter-display", save_to = "r1" },
  { action = "read", id = "email-input", save_to = "r2" },
  { action = "read", id = "search-input", save_to = "r3" },
  { action = "read", id = "list-item-0", save_to = "r4" },
  { action = "read", id = "list-item-1", save_to = "r5" },
  { action = "read", id = "list-item-2", save_to = "r6" },
  { action = "read", id = "carousel-item-0", save_to = "r7" },
  { action = "read", id = "carousel-item-1", save_to = "r8" },
  { action = "read", id = "submit-button", save_to = "r9" },
  { action = "read", id = "increment-button", save_to = "r10" },
]

[[block]]
name = "rapid_visibility_burst"
steps = [
  # Burst assert_visible on many elements in rapid succession
  { action = "assert_visible", id = "submit-button" },
  { action = "assert_visible", id = "increment-button" },
  { action = "assert_visible", id = "decrement-button" },
  { action = "assert_visible", id = "counter-display" },
  { action = "assert_visible", id = "email-input" },
  { action = "assert_visible", id = "password-input" },
  { action = "assert_visible", id = "search-input" },
  { action = "assert_visible", id = "scroll-list" },
  { action = "assert_visible", id = "carousel" },
  { action = "assert_visible", id = "list-item-0" },
  { action = "assert_visible", id = "list-item-1" },
  { action = "assert_visible", id = "list-item-2" },
  { action = "assert_visible", id = "carousel-item-0" },
  { action = "assert_visible", id = "carousel-item-1" },

  # Final screenshot to verify app is still in a consistent state
  { action = "screenshot" },
]
