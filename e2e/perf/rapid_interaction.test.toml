[flow]
name = "Rapid interaction stress test"
tags = ["perf", "stress", "rapid", "interaction"]

[[flow.apps]]
name = "app"
[[flow.apps.devices]]
os = ["ios:latest", "android:latest"]
type = "phone"

[[block]]
name = "launch_and_wait"
steps = [
  # Launch the app and wait for initial load
  { action = "launch", app = "fail.golem.test" },
  { action = "assert_visible", on_text = "Submit" },
]

[[block]]
name = "rapid_form_fill"
steps = [
  # Rapidly type into all input fields in quick succession. The
  # placeholder text disappears once the field has a value, so we
  # verify the typed value instead of re-asserting the placeholder.
  { action = "type", on_text = "Enter email", input = "perf@example.com" },
  { action = "assert_visible", on_text = "perf@example.com" },

  { action = "type", on_text = "Password", input = "Str0ngP@ss!" },

  { action = "type", on_text = "Search", input = "rapid test query" },
  { action = "assert_visible", on_text = "rapid test query" },

  # Hide keyboard between interactions
  { action = "hide_keyboard" },
]

[[block]]
name = "rapid_counter_burst"
steps = [
  # Rapidly tap increment button 5 times without waiting between taps.
  # First tap uses auto_scroll because the form section above may have
  # scrolled Counter off-screen during the rapid_form_fill block.
  { action = "tap", on_text = "+", auto_scroll = true },
  { action = "tap", on_text = "+" },
  { action = "tap", on_text = "+" },
  { action = "tap", on_text = "+" },
  { action = "tap", on_text = "+" },

  # Now verify the counter reached the expected value
  { action = "assert_visible", on_text = "Counter", timeout = 2000 },
  { action = "assert_visible", on_text = "5", on_below = "Counter" },

  # Rapidly decrement 3 times
  { action = "tap", on_text = "-" },
  { action = "tap", on_text = "-" },
  { action = "tap", on_text = "-" },

  # Verify counter after burst decrement
  { action = "assert_visible", on_text = "Counter", timeout = 2000 },
  { action = "assert_visible", on_text = "2", on_below = "Counter" },
]

[[block]]
name = "rapid_mixed_actions"
steps = [
  # Mix taps, reads, and asserts in rapid succession
  { action = "tap", on_text = "+" },
  { action = "read", on_below = "Counter", on_index = 0, save_to = "mid_count_1" },
  { action = "assert_visible", on_text = "Submit" },
  { action = "tap", on_text = "+" },
  { action = "read", on_below = "Counter", on_index = 0, save_to = "mid_count_2" },
  { action = "assert_visible", on_text = "perf@example.com" },
  { action = "tap", on_text = "+" },
  { action = "read", on_below = "Counter", on_index = 0, save_to = "mid_count_3" },
  { action = "assert_visible", on_text = "Scroll List", auto_scroll = true },
  { action = "tap", on_text = "+", auto_scroll = true },
  { action = "read", on_below = "Counter", on_index = 0, save_to = "mid_count_4" },
  { action = "assert_visible", on_text = "Carousel", auto_scroll = true },
]

[[block]]
name = "rapid_read_burst"
steps = [
  # Burst-read many elements in rapid succession
  { action = "read", on_below = "Counter", on_index = 0, save_to = "r1" },
  { action = "read", on_text = "Enter email", save_to = "r2" },
  { action = "read", on_text = "Search", save_to = "r3" },
  { action = "read", on_text = "Item 0", save_to = "r4" },
  { action = "read", on_text = "Item 1", save_to = "r5" },
  { action = "read", on_text = "Item 2", save_to = "r6" },
  { action = "read", on_text = "Card 0", save_to = "r7" },
  { action = "read", on_text = "Card 1", save_to = "r8" },
  { action = "read", on_text = "Submit", save_to = "r9" },
  { action = "read", on_text = "+", save_to = "r10" },
]

[[block]]
name = "rapid_visibility_burst"
steps = [
  # Burst assert_visible on many elements in rapid succession
  { action = "assert_visible", on_text = "Submit" },
  { action = "assert_visible", on_text = "+" },
  { action = "assert_visible", on_text = "-" },
  { action = "assert_visible", on_text = "Counter" },
  { action = "assert_visible", on_text = "perf@example.com" },
  { action = "assert_visible", on_text = "rapid test query" },
  { action = "assert_visible", on_text = "Scroll List", auto_scroll = true },
  { action = "assert_visible", on_text = "Carousel", auto_scroll = true },
  { action = "assert_visible", on_text = "Item 0" },
  { action = "assert_visible", on_text = "Item 1" },
  { action = "assert_visible", on_text = "Item 2" },
  { action = "assert_visible", on_text = "Card 0" },
  { action = "assert_visible", on_text = "Card 1" },

  # Final screenshot to verify app is still in a consistent state
  { action = "screenshot" },
]
