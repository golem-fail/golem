[flow]
name = "Element find latency"
tags = ["perf", "element-find", "latency"]

[[flow.apps]]
name = "app"
bundle = "fail.golem.test"

[[flow.apps.devices]]
os = "ios:latest"
type = "phone"

[[flow.apps.devices]]
os = "android:latest"
type = "phone"

[[block]]
name = "launch_and_wait"
steps = [
  # Launch the app and wait for initial load
  { action = "launch", app = "fail.golem.test" },
  { action = "wait", on_text = "Submit" },
]

[[block]]
name = "find_by_id_buttons"
steps = [
  # Rapidly assert visibility of button elements by ID (fast path)
  { action = "assert_visible", on_text = "Submit" },
  { action = "assert_visible", on_text = "+" },
  { action = "assert_visible", on_text = "-" },

  # Tight-timeout waits to enforce speed
  { action = "wait", on_text = "Submit", timeout = 2000 },
  { action = "wait", on_text = "+", timeout = 2000 },
  { action = "wait", on_text = "-", timeout = 2000 },
]

[[block]]
name = "find_by_id_inputs"
steps = [
  # Assert visibility of input fields by ID
  { action = "assert_visible", on_text = "Enter email" },
  { action = "assert_visible", on_text = "Password" },
  { action = "assert_visible", on_text = "Search" },

  # Tight-timeout waits on input fields
  { action = "wait", on_text = "Enter email", timeout = 2000 },
  { action = "wait", on_text = "Password", timeout = 2000 },
  { action = "wait", on_text = "Search", timeout = 2000 },
]

[[block]]
name = "find_by_id_display_and_containers"
steps = [
  # Assert visibility of display and container elements
  { action = "assert_visible", on_text = "Counter" },
  { action = "assert_visible", on_text = "scroll-list" },
  { action = "assert_visible", on_text = "carousel" },

  { action = "wait", on_text = "Counter", timeout = 2000 },
  { action = "wait", on_text = "scroll-list", timeout = 2000 },
  { action = "wait", on_text = "carousel", timeout = 2000 },
]

[[block]]
name = "find_list_items_rapid"
steps = [
  # Rapidly find list items scattered throughout the hierarchy
  { action = "assert_visible", on_text = "list-item-0" },
  { action = "assert_visible", on_text = "list-item-1" },
  { action = "assert_visible", on_text = "list-item-2" },
  { action = "assert_visible", on_text = "list-item-3" },
  { action = "assert_visible", on_text = "list-item-4" },

  # Tight-timeout waits on each list item
  { action = "wait", on_text = "list-item-0", timeout = 2000 },
  { action = "wait", on_text = "list-item-1", timeout = 2000 },
  { action = "wait", on_text = "list-item-2", timeout = 2000 },
  { action = "wait", on_text = "list-item-3", timeout = 2000 },
  { action = "wait", on_text = "list-item-4", timeout = 2000 },
]

[[block]]
name = "find_carousel_items_rapid"
steps = [
  # Rapidly find carousel items
  { action = "assert_visible", on_text = "carousel-item-0" },
  { action = "assert_visible", on_text = "carousel-item-1" },
  { action = "assert_visible", on_text = "carousel-item-2" },
  { action = "assert_visible", on_text = "carousel-item-3" },
  { action = "assert_visible", on_text = "carousel-item-4" },

  { action = "wait", on_text = "carousel-item-0", timeout = 2000 },
  { action = "wait", on_text = "carousel-item-1", timeout = 2000 },
  { action = "wait", on_text = "carousel-item-2", timeout = 2000 },
  { action = "wait", on_text = "carousel-item-3", timeout = 2000 },
  { action = "wait", on_text = "carousel-item-4", timeout = 2000 },
]

[[block]]
name = "find_by_text_content"
steps = [
  # Assert text on elements — exercises the slower text-matching path
  { action = "assert_visible", on_text = "0", on_below = "Counter" },
  { action = "assert_visible", on_text = "Item 0" },
  { action = "assert_visible", on_text = "Item 1" },
  { action = "assert_visible", on_text = "Item 2" },
  { action = "assert_visible", on_text = "Item 3" },
  { action = "assert_visible", on_text = "Item 4" },

  # Final screenshot
  { action = "screenshot" },
]
