[flow]
name = "Element find latency"
tags = ["perf", "element-find", "latency"]

[[flow.apps]]
name = "app"
[[flow.apps.devices]]
os = ["ios:latest", "android:latest"]
type = "phone"

[[block]]
name = "launch_and_wait"
steps = [
  # Launch the app and wait for initial load
  { action = "launch", app = "fail.golem.test" },
  { action = "assert_visible", on_text = "Submit" },
]

[[block]]
name = "find_by_id_buttons"
steps = [
  # Rapidly assert visibility of button elements by ID (fast path)
  { action = "assert_visible", on_text = "Submit" },
  { action = "assert_visible", on_text = "+" },
  { action = "assert_visible", on_text = "-" },

  # Tight-timeout waits to enforce speed
  { action = "assert_visible", on_text = "Submit", timeout = 5000 },
  { action = "assert_visible", on_text = "+", timeout = 5000 },
  { action = "assert_visible", on_text = "-", timeout = 5000 },
]

[[block]]
name = "find_by_id_inputs"
steps = [
  # Assert visibility of input fields by ID
  { action = "assert_visible", on_text = "Enter email" },
  { action = "assert_visible", on_text = "Password" },
  { action = "assert_visible", on_text = "Search" },

  # Tight-timeout waits on input fields
  { action = "assert_visible", on_text = "Enter email", timeout = 5000 },
  { action = "assert_visible", on_text = "Password", timeout = 5000 },
  { action = "assert_visible", on_text = "Search", timeout = 5000 },
]

[[block]]
name = "find_by_id_display_and_containers"
steps = [
  # Jump to the Scroll List section so the list and carousel headers
  # are within the viewport — this flow is testing find latency on
  # an in-view tree, not the scroller.
  { action = "tap", on_accessibility_label = "menu-toggle" },
  { action = "tap", on_accessibility_label = "goto-scroll-list" },
  { action = "assert_visible", on_text = "Counter", auto_scroll = true },
  { action = "assert_visible", on_text = "Scroll List", auto_scroll = true },
]

[[block]]
name = "find_list_items_rapid"
steps = [
  # ScrollList is an inner overflow-y:auto container of fixed height
  # — only the first row sits inside the outer viewport when the
  # section is scrolled into view. Use auto_scroll on each item so
  # the resolver brings it on-screen before the find. The "rapid"
  # latency claim is exercised by the tight-timeout second pass.
  { action = "assert_visible", on_text = "Item 0", auto_scroll = true },
  { action = "assert_visible", on_text = "Item 1", auto_scroll = true },
  { action = "assert_visible", on_text = "Item 2", auto_scroll = true },
  { action = "assert_visible", on_text = "Item 3", auto_scroll = true },
  { action = "assert_visible", on_text = "Item 4", auto_scroll = true },

  # Tight-timeout waits — the find must complete inside 5s even
  # after auto_scroll has shifted the page, exercising the
  # element-find path on an already-rendered tree.
  { action = "assert_visible", on_text = "Item 0", timeout = 5000, auto_scroll = true },
  { action = "assert_visible", on_text = "Item 1", timeout = 5000, auto_scroll = true },
  { action = "assert_visible", on_text = "Item 2", timeout = 5000, auto_scroll = true },
  { action = "assert_visible", on_text = "Item 3", timeout = 5000, auto_scroll = true },
  { action = "assert_visible", on_text = "Item 4", timeout = 5000, auto_scroll = true },
]

[[block]]
name = "find_carousel_items_rapid"
steps = [
  # Jump to the Carousel section.
  { action = "tap", on_accessibility_label = "menu-toggle" },
  { action = "tap", on_accessibility_label = "goto-carousel" },

  # Only Card 0 is in view by default; later cards require swipe-left
  # which is out of scope for an element-find latency test.
  { action = "assert_visible", on_text = "Card 0" },
  { action = "assert_visible", on_text = "Card 0", timeout = 5000 },
]

[[block]]
name = "find_by_text_content"
steps = [
  # Menu-nav back to Counter — the previous block left us on the
  # Carousel section, with Counter scrolled well above the fold.
  { action = "tap", on_accessibility_label = "menu-toggle" },
  { action = "tap", on_accessibility_label = "goto-counter" },

  # Assert text on elements — exercises the slower text-matching path.
  # Items 1-4 also need auto_scroll: ScrollList's inner overflow-y:auto
  # only renders one row inside the outer viewport at a time.
  { action = "assert_visible", on_text = "0", on_below = "Counter" },
  { action = "assert_visible", on_text = "Item 0", auto_scroll = true },
  { action = "assert_visible", on_text = "Item 1", auto_scroll = true },
  { action = "assert_visible", on_text = "Item 2", auto_scroll = true },
  { action = "assert_visible", on_text = "Item 3", auto_scroll = true },
  { action = "assert_visible", on_text = "Item 4", auto_scroll = true },

  # Final screenshot
  { action = "screenshot" },
]
