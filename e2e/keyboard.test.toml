[flow]
name = "Keyboard test"
tags = ["cross-platform", "interaction", "keyboard"]

[[flow.apps]]
name = "app"
[[flow.apps.devices]]
os = ["ios:latest", "android:latest"]
type = "phone"

# The text fields live on the dedicated "text fields" screen, reached via
# the menu — navigate there first (the app's home screen has no inputs).
[[block]]
name = "keyboard_management"
steps = [
  { action = "tap", on_accessibility_label = "menu-toggle" },
  { action = "tap", on_accessibility_label = "goto-text-fields" },

  # Type into a field to bring up the keyboard, then verify it landed.
  { action = "type", on_text = "Enter email", input = "test@example.com", auto_scroll = true },
  { action = "assert_visible", on_text = "test@example.com" },

  # Dismiss the keyboard — the typed text must persist after it hides.
  { action = "hide_keyboard" },
  { action = "assert_visible", on_text = "test@example.com" },

  # Type into another field, then backspace one char. `backspace` is
  # focus-only (no selector) — it erases from the field just typed into,
  # whose caret the OS left at the end.
  { action = "type", on_text = "Search", input = "golem testt", auto_scroll = true },
  { action = "assert_visible", on_text = "golem testt" },
  { action = "backspace", count = 1 },
  { action = "assert_visible", on_text = "golem test" },

  # Append to the still-focused field with a selector-less `type` — no
  # re-tap, so the caret stays at the end and the text appends cleanly.
  { action = "type", input = " query" },
  { action = "assert_visible", on_text = "golem test query" },

  # Dismiss again — both fields' values persist.
  { action = "hide_keyboard" },
  { action = "assert_visible", on_text = "test@example.com" },
  { action = "assert_visible", on_text = "golem test query" },
]
