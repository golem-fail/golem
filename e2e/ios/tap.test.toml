[flow]
name = "iOS tap test"
tags = ["ios", "interaction", "smoke"]

[[flow.apps]]
name = "app"
bundle = "com.golem.test"

[[flow.apps.devices]]
os = "ios:latest"
type = "phone"

[[block]]
name = "tap_tests"
steps = [
  { action = "launch", app = "com.golem.test" },
  { action = "tap", text = "Submit" },
  { action = "tap", text = "Action", index = 0 },
  { action = "tap", text = "Increment" },
  { action = "tap", text = "Increment" },
  { action = "tap", text = "Decrement" },
  { action = "assert_text", text = "1" },
]
