[flow]
name = "iOS app lifecycle test"
tags = ["ios", "lifecycle"]

[[flow.apps]]
name = "app"
bundle = "com.golem.test"

[[flow.apps.devices]]
os = "ios:latest"
type = "phone"

[[block]]
name = "launch_and_stop"
steps = [
  # Launch the app
  { action = "launch", app = "com.golem.test" },

  # Verify the app is running by checking for a known element
  { action = "wait", accessibility_id = "submit-button", timeout = 10000 },
  { action = "assert_visible", accessibility_id = "counter-display" },

  # Interact to set some state
  { action = "tap", accessibility_id = "increment-button" },
  { action = "assert_text", accessibility_id = "counter-display", text = "1" },

  # Stop the app
  { action = "stop", app = "com.golem.test" },

  # Re-launch the app (state may be reset)
  { action = "launch", app = "com.golem.test" },

  # Verify the app is running again
  { action = "wait", accessibility_id = "submit-button", timeout = 10000 },
  { action = "assert_visible", accessibility_id = "counter-display" },
]
