[flow]
name = "Cross-platform device controls test"
tags = ["cross-platform", "device", "controls", "dark-mode"]

[[flow.apps]]
name = "app"
[[flow.apps.devices]]
os = ["ios:latest", "android:latest"]
type = "phone"

[[block]]
name = "initial_state"
steps = [
  # iOS / Android system dark-mode is device-level state and persists
  # across app launches. A prior run that toggled it on would leak
  # into the next run's "initial" assertion. Reset before asserting.
  { action = "set_dark_mode", enabled = false },

  # Jump to Device State via the menu rather than swiping ~3000px
  # past every preceding section — scroll is not what this flow tests.
  { action = "tap", on_accessibility_label = "menu-toggle" },
  { action = "tap", on_accessibility_label = "goto-device-state" },
  { action = "assert_visible", on_text = "Light", on_right_of = "Theme:" },
  { action = "assert_visible", on_text = "0.0, 0.0", on_right_of = "Location:" },

  # Press the home button and re-launch
  { action = "press", button = "home" },
  { action = "launch", app = "app" },
  { action = "assert_visible", on_text = "Theme:", auto_scroll = true },
]

# Android-only: prove the back button signal reaches the WebView.
# DeviceState seeds an initial `history.pushState({})` and listens
# for `popstate`, which fires when Tauri's Android activity
# forwards the back key to the WebView (instead of finishing the
# activity outright). Each fire increments the `Back:` counter
# rendered in the Device State section.
[[block]]
name = "android_back_button"
where = { os = "android" }
steps = [
  { action = "tap", on_accessibility_label = "menu-toggle" },
  { action = "tap", on_accessibility_label = "goto-device-state" },
  { action = "assert_visible", on_text = "0", on_right_of = "Back:" },
  # Each `press back` pops the seeded history entry in DeviceState,
  # firing `popstate`; the handler increments `backCount` and
  # re-seeds so the next press also intercepts. Tauri scrolls the
  # page to the top on back, so subsequent asserts menu-nav back
  # to Device State to bring the row in view.
  { action = "press", button = "back" },
  { action = "tap", on_accessibility_label = "menu-toggle" },
  { action = "tap", on_accessibility_label = "goto-device-state" },
  { action = "assert_visible", on_text = "1", on_right_of = "Back:" },
  { action = "press", button = "back" },
  { action = "tap", on_accessibility_label = "menu-toggle" },
  { action = "tap", on_accessibility_label = "goto-device-state" },
  { action = "assert_visible", on_text = "2", on_right_of = "Back:" },
]

[[block]]
name = "dark_mode_controls"
steps = [
  # Jump to Device State to read Theme.
  { action = "tap", on_accessibility_label = "menu-toggle" },
  { action = "tap", on_accessibility_label = "goto-device-state" },
  { action = "assert_visible", on_text = "Light", on_right_of = "Theme:" },

  # Enable dark mode and verify
  { action = "set_dark_mode", enabled = true },
  { action = "assert_visible", on_text = "Dark", on_right_of = "Theme:" },

  # Take a screenshot in dark mode
  { action = "screenshot", path = "/tmp/golem-cross-dark-mode.png" },

  # Verify Counter still works in dark mode — jump to it via menu.
  { action = "tap", on_accessibility_label = "menu-toggle" },
  { action = "tap", on_accessibility_label = "goto-counter" },
  { action = "tap", on_text = "+" },
  { action = "assert_visible", on_text = "1", on_below = "Counter" },

  # Back to Device State to verify return to light theme.
  { action = "tap", on_accessibility_label = "menu-toggle" },
  { action = "tap", on_accessibility_label = "goto-device-state" },
  { action = "set_dark_mode", enabled = false },
  { action = "assert_visible", on_text = "Light", on_right_of = "Theme:" },
]

# location_controls disabled: current `set_location` path on Android
# routes through `adb emu geo fix` (OS-level) PLUS a JS hook
# (`window.__golemSetLocation`) that writes the rendered "Location:"
# row directly, bypassing the geolocation permission flow entirely.
# The hook is a WebView-only shortcut that proves nothing about real
# geolocation plumbing. See roadmap "set_location: drop WebView JS
# hook, grant permission + assert via real geolocation" for the
# proper path.
