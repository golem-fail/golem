[flow]
name = "Increment counter subflow"
# Runs only as a run_flow child (or when named/tagged explicitly), never in the
# bare `golem run` sweep — a standalone run would be redundant with subflow.test.toml.
explicit_only = true

[flow.options]
app_lifecycle = "manual"

[[block]]
name = "increment"
steps = [
  { action = "tap", on_text = "+" },
  { action = "read", on_below = "Counter", on_index = 0, save_to = "counter_value" },
]
