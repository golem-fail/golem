[flow]
name = "Type and backspace test"
tags = ["cross-platform", "interaction", "text-input"]

[[flow.apps]]
name = "app"
[[flow.apps.devices]]
os = ["ios:latest", "android:latest"]
type = "phone"

[[block]]
name = "type_into_fields"
steps = [
  # Type a generated email into the email field (a real address; has '@').
  # auto_scroll: the field sits below the fold on short (phone) viewports.
  { action = "type", on_text = "Enter email", input = "${fake:email}", auto_scroll = true },
  { action = "assert_visible", on_text = "*@*" },

  # Type into the password field
  { action = "type", on_text = "Password", input = "s3cret!" },

  # Type into the search field
  { action = "type", on_text = "Search", input = "hello world" },

  # Backspace to correct a typo in search
  { action = "backspace", count = 5 },
  { action = "type", on_text = "hello ", input = "earth" },

  # Multi-line text area, mixed ASCII + Unicode (Enter between lines).
  # iOS types Unicode natively via XCUITest `typeText`; Android's
  # `input text` is ASCII-only, so the non-ASCII line routes through the
  # bundled golem IME (activated for the session, original keyboard
  # restored at teardown). The textarea is a single node holding the
  # whole value and matching is anchored, so assert the exact two-line
  # string (a partial would need a glob like "行一 line*").
  { action = "type", on_text = "Multi-line text", input = "行一 line\nline two" },
  { action = "assert_visible", on_text = "行一 line\nline two" },

  # Hide the keyboard after typing
  { action = "hide_keyboard" },
]
