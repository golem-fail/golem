[flow]
name = "Custom scheme deep links"
tags = ["deep-link", "navigation", "cross-platform"]

[[flow.apps]]
name = "app"
[[flow.apps.devices]]
os = ["ios:latest", "android:latest"]
type = "phone"

[[block]]
name = "verify_initial_state"
steps = [
  # Launch the app and navigate to the Device State section where the
  # Deep Link display lives — the default landing section is Counter.
  { action = "launch", app = "fail.golem.test" },
  { action = "assert_visible", on_text = "Counter" },
  { action = "tap", on_accessibility_label = "menu-toggle" },
  { action = "tap", on_accessibility_label = "goto-device-state" },
  { action = "assert_visible", on_text = "Deep Link:" },
]

[[block]]
name = "open_simple_deep_link"
steps = [
  { action = "open_link", url = "golem-test://home" },
  { action = "accept_alert", if_fail = "ignore" },
  { action = "assert_visible", on_text = "golem-test://home", on_right_of = "Deep Link:", timeout = 15000 },
]

[[block]]
name = "open_deep_link_with_query_params"
steps = [
  { action = "open_link", url = "golem-test://profile?user=42&tab=settings" },
  { action = "accept_alert", if_fail = "ignore" },
  { action = "assert_visible", on_text = "golem-test://profile?user=42&tab=settings", on_right_of = "Deep Link:", timeout = 15000 },
]

[[block]]
name = "open_deep_link_with_path_segment"
steps = [
  { action = "open_link", url = "golem-test://item/12345" },
  { action = "accept_alert", if_fail = "ignore" },
  { action = "assert_visible", on_text = "golem-test://item/12345", on_right_of = "Deep Link:", timeout = 15000 },
]
