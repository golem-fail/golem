[flow]
name = "Custom scheme deep links"
tags = ["deep-link", "navigation", "cross-platform"]

[[flow.apps]]
name = "app"
bundle = "com.golem.test"

[[flow.apps.devices]]
os = "ios:latest"
type = "phone"

[[flow.apps.devices]]
os = "android:latest"
type = "phone"

[[block]]
name = "verify_initial_state"
steps = [
  # Launch the app and verify deep link display is initially empty
  { action = "launch", app = "com.golem.test" },
  { action = "wait", id = "deeplink-display", timeout = 10000 },
  { action = "assert_text", id = "deeplink-display", text = "" },
]

[[block]]
name = "open_simple_deep_link"
steps = [
  # Open a simple deep link with the golem-test scheme
  { action = "open_link", url = "golem-test://home" },
  { action = "wait", id = "deeplink-display", timeout = 5000 },
  { action = "assert_text", id = "deeplink-display", text = "golem-test://home" },
]

[[block]]
name = "open_deep_link_with_query_params"
steps = [
  # Open a deep link with path and query parameters
  { action = "open_link", url = "golem-test://profile?user=42&tab=settings" },
  { action = "wait", id = "deeplink-display", timeout = 5000 },
  { action = "assert_text", id = "deeplink-display", text = "golem-test://profile?user=42&tab=settings" },
]

[[block]]
name = "open_deep_link_with_path_segment"
steps = [
  # Open a deep link to a specific content item with a nested path
  { action = "open_link", url = "golem-test://item/12345" },
  { action = "wait", id = "deeplink-display", timeout = 5000 },
  { action = "assert_text", id = "deeplink-display", text = "golem-test://item/12345" },
]
