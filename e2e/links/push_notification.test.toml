[flow]
name = "Push notification display and verification"
tags = ["push-notification", "cross-platform"]

[[flow.apps]]
name = "app"
bundle = "com.golem.test"

[[flow.apps.devices]]
os = "ios:latest"
type = "phone"

[[flow.apps.devices]]
os = "android:latest"
type = "phone"

[[block]]
name = "verify_initial_state"
steps = [
  # Launch the app and verify notification display is initially empty
  { action = "launch", app = "com.golem.test" },
  { action = "wait", id = "notification-display", timeout = 10000 },
  { action = "assert_text", id = "notification-display", text = "" },
]

[[block]]
name = "send_first_notification"
steps = [
  # Send a push notification to the app
  { action = "push_notification", title = "Test Alert", body = "Hello from GOLEM", app = "com.golem.test" },

  # Wait for the notification display to update and verify content
  { action = "wait", id = "notification-display", timeout = 10000 },
  { action = "assert_text", id = "notification-display", text = "Hello from GOLEM" },
]

[[block]]
name = "send_second_notification"
steps = [
  # Send another push notification with different content
  { action = "push_notification", title = "Second Alert", body = "Updated notification payload", app = "com.golem.test" },

  # Verify the notification display updates with the new content
  { action = "wait", id = "notification-display", timeout = 10000 },
  { action = "assert_text", id = "notification-display", text = "Updated notification payload" },
]
