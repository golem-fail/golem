[flow]
# Push notifications need a native receive bridge — Tauri 2.x doesn't
# expose UNUserNotificationCenter / BroadcastReceiver hooks via plugins
# today, so this flow runs against test-app-b (native SwiftUI / Compose
# Activity) where the delegate / receiver code lives in plain Swift /
# Kotlin and updates a `notification-display-b` element.
#
# `push_notification` is sim/emu-only on both platforms by design.
# Physical-device push delivery requires real APNS / FCM infrastructure
# (provisioning, server keys, device tokens) which is out of scope for
# golem's action library. Test authors targeting physical devices
# compose their own delivery via `branch` + `http_*` to their backend.
name = "Push notification display and verification"
tags = ["push-notification", "cross-platform"]

[[flow.apps]]
name = "app-b"
[[flow.apps.devices]]
os = ["ios:latest", "android:latest"]
type = "phone"

[[block]]
name = "verify_initial_state"
steps = [
  { action = "launch", app = "app-b" },
  { action = "assert_visible", on_text = "GOLEM Test B" },
  { action = "assert_visible", on_text = "Notification:" },
]

[[block]]
name = "send_first_notification"
steps = [
  { action = "push_notification", title = "Test Alert", body = "Hello from GOLEM", app = "app-b" },
  { action = "assert_visible", on_text = "Hello from GOLEM", on_right_of = "Notification:" },
]

[[block]]
name = "send_second_notification"
steps = [
  { action = "push_notification", title = "Second Alert", body = "Updated notification payload", app = "app-b" },
  { action = "assert_visible", on_text = "Updated notification payload", on_right_of = "Notification:" },
]
