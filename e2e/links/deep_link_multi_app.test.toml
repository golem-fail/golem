[flow]
name = "Deep links across multiple apps"
tags = ["deep-link", "multi-app", "cross-platform"]

[[flow.apps]]
name = "app"
bundle = "com.golem.test"

[[flow.apps.devices]]
os = "ios:latest"
type = "phone"

[[flow.apps.devices]]
os = "android:latest"
type = "phone"

[[flow.apps]]
name = "app-b"
bundle = "com.golem.test-b"

[[flow.apps.devices]]
os = "ios:latest"
type = "phone"

[[flow.apps.devices]]
os = "android:latest"
type = "phone"

[[block]]
name = "deep_link_app_a"
steps = [
  # Launch app A and verify deep link display is empty
  { action = "launch", app = "com.golem.test" },
  { action = "wait", accessibility_id = "deeplink-display", timeout = 10000 },
  { action = "assert_text", accessibility_id = "deeplink-display", text = "" },

  # Open a deep link for app A and verify it is received
  { action = "open_link", url = "golem-test://home" },
  { action = "wait", accessibility_id = "deeplink-display", timeout = 5000 },
  { action = "assert_text", accessibility_id = "deeplink-display", text = "golem-test://home" },
]

[[block]]
name = "deep_link_app_b"
steps = [
  # Launch app B
  { action = "launch", app = "com.golem.test-b" },
  { action = "wait", accessibility_id = "deeplink-display-b", timeout = 10000 },

  # Open a deep link for app B and verify it is received
  { action = "open_link", url = "golem-test-b://dashboard" },
  { action = "wait", accessibility_id = "deeplink-display-b", timeout = 5000 },
  { action = "assert_text", accessibility_id = "deeplink-display-b", text = "golem-test-b://dashboard" },
]

[[block]]
name = "verify_app_a_state_preserved"
steps = [
  # Switch back to app A
  { action = "launch", app = "com.golem.test" },
  { action = "wait", accessibility_id = "deeplink-display", timeout = 10000 },

  # Verify app A's deep link display still shows the previously received link
  { action = "assert_text", accessibility_id = "deeplink-display", text = "golem-test://home" },

  # Stop app B
  { action = "stop", app = "com.golem.test-b" },
]
