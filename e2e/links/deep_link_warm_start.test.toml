[flow]
name = "Deep link warm start"
tags = ["deep-link", "warm-start", "cross-platform"]

[[flow.apps]]
name = "app"
[[flow.apps.devices]]
os = ["ios:latest", "android:latest"]
type = "phone"

[[block]]
name = "set_app_state"
steps = [
  # Launch the app and wait for it to be ready
  { action = "launch", app = "fail.golem.test" },
  { action = "wait", on_text = "Counter" },

  # Set some state by incrementing the counter
  { action = "tap", on_text = "+" },
  { action = "tap", on_text = "+" },
  { action = "tap", on_text = "+" },
  { action = "assert_visible", on_text = "3", on_below = "Counter" },

  # Navigate to the Device State section where the Deep Link display lives
  { action = "tap", on_accessibility_label = "menu-toggle" },
  { action = "tap", on_accessibility_label = "goto-device-state" },

  # Verify deep link display is empty before receiving a link
  { action = "assert_visible", on_text = "Deep Link:" },
]

[[block]]
name = "receive_deep_link_while_running"
steps = [
  # Open a deep link while the app is already running (warm start).
  # iOS shows a native "Open in <App>?" confirmation the first time a
  # custom URL scheme is opened from outside the app — accept it to
  # forward the URL to the plugin's openURL handler.
  { action = "open_link", url = "golem-test://warm-start" },
  { action = "accept_alert" },
  { action = "wait", on_text = "Deep Link:" },
  { action = "assert_visible", on_text = "golem-test://warm-start", on_right_of = "Deep Link:" },
]

[[block]]
name = "verify_state_preserved"
steps = [
  # Verify that the counter state set before the deep link is still intact
  { action = "assert_visible", on_text = "3", on_below = "Counter" },

  # Verify the app is still functional after receiving the deep link
  { action = "tap", on_text = "+" },
  { action = "assert_visible", on_text = "4", on_below = "Counter" },
]
