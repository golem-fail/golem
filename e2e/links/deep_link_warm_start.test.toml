[flow]
name = "Deep link warm start"
tags = ["deep-link", "warm-start", "cross-platform"]

[[flow.apps]]
name = "app"
bundle = "com.golem.test"

[[flow.apps.devices]]
os = "ios:latest"
type = "phone"

[[flow.apps.devices]]
os = "android:latest"
type = "phone"

[[block]]
name = "set_app_state"
steps = [
  # Launch the app and wait for it to be ready
  { action = "launch", app = "com.golem.test" },
  { action = "wait", text = "Counter", timeout = 10000 },

  # Set some state by incrementing the counter
  { action = "tap", text = "Increment" },
  { action = "tap", text = "Increment" },
  { action = "tap", text = "Increment" },
  { action = "assert_visible", text = "3", below = "Counter", element_type = "text" },

  # Verify deep link display is empty before receiving a link
  { action = "assert_visible", text = "Deep Link:" },
]

[[block]]
name = "receive_deep_link_while_running"
steps = [
  # Open a deep link while the app is already running (warm start)
  { action = "open_link", url = "golem-test://warm-start" },
  { action = "wait", text = "Deep Link:", timeout = 5000 },
  { action = "assert_visible", text = "golem-test://warm-start", right_of = "Deep Link:" },
]

[[block]]
name = "verify_state_preserved"
steps = [
  # Verify that the counter state set before the deep link is still intact
  { action = "assert_visible", text = "3", below = "Counter", element_type = "text" },

  # Verify the app is still functional after receiving the deep link
  { action = "tap", text = "Increment" },
  { action = "assert_visible", text = "4", below = "Counter", element_type = "text" },
]
