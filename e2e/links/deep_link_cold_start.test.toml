[flow]
name = "Deep link cold start"
tags = ["deep-link", "cold-start", "cross-platform"]

[[flow.apps]]
name = "app"
[[flow.apps.devices]]
os = ["ios:latest", "android:latest"]
type = "phone"

[[block]]
name = "cold_start_via_deep_link"
steps = [
  # Ensure the app is not running before opening the URL — guarantees
  # a true cold start rather than a foreground URL delivery.
  { action = "stop", app = "fail.golem.test" },

  # Opening the URL with the app down launches it from cold. iOS shows
  # an "Open in <App>?" confirmation the first time a custom scheme is
  # used on a sim; the companion's UIInterruptionMonitor handles it
  # via accept_alert (idempotent on warm sims that remembered the
  # earlier accept, hence if_fail = "ignore").
  { action = "open_link", url = "golem-test://cold-start-test" },
  { action = "accept_alert", if_fail = "ignore" },

  # The app launches into the Counter section by default — navigate
  # to Device State to see the deep-link display.
  { action = "assert_visible", on_text = "Counter", timeout = 15000 },
  { action = "tap", on_accessibility_label = "menu-toggle" },
  { action = "tap", on_accessibility_label = "goto-device-state" },

  { action = "assert_visible", on_text = "Deep Link:" },
  { action = "assert_visible", on_text = "golem-test://cold-start-test", on_right_of = "Deep Link:" },
]
