[flow]
name = "Permission grant and revoke cycle"
tags = ["permissions", "cross-platform"]

[[flow.apps]]
name = "app"
[[flow.apps.devices]]
os = ["ios:latest", "android:latest"]
type = "phone"

[[block]]
name = "camera_permission_cycle"
steps = [
  # Launch the app
  { action = "launch", app = "fail.golem.test" },
  { action = "wait", on_text = "camera-permission-button" },

  # Grant camera permission before tapping the button
  { action = "grant_permission", permission = "camera" },

  # Tap the camera permission button; no permission dialog should appear
  { action = "tap", on_text = "camera-permission-button" },

  # Revoke camera permission
  { action = "revoke_permission", permission = "camera" },
]

[[block]]
name = "location_permission_cycle"
steps = [
  # Grant location permission
  { action = "grant_permission", permission = "location" },

  # Tap the location permission button; no permission dialog should appear
  { action = "tap", on_text = "location-permission-button" },

  # Revoke location permission
  { action = "revoke_permission", permission = "location" },
]
