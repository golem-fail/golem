[flow]
name = "Deep link test"
tags = ["cross-platform", "navigation", "deep-link"]

[[flow.apps]]
name = "app"
bundle = "com.golem.test"

[[flow.apps.devices]]
os = "ios:latest"
type = "phone"

[[flow.apps.devices]]
os = "android:latest"
type = "phone"

[[block]]
name = "deep_link_tests"
steps = [
  # Verify the deep link label is visible before navigating
  { action = "assert_visible", text = "Deep Link:" },

  # Open a deep link with the golem-test scheme
  { action = "open_link", url = "golem-test://home" },
  { action = "wait", text = "Deep Link:", timeout = 5000 },
  { action = "assert_visible", text = "golem-test://home", right_of = "Deep Link:" },

  # Open a deep link with a path and query parameters
  { action = "open_link", url = "golem-test://profile?user=42&tab=settings" },
  { action = "wait", text = "Deep Link:", timeout = 5000 },
  { action = "assert_visible", text = "golem-test://profile?user=42&tab=settings", right_of = "Deep Link:" },

  # Open a deep link to a specific content item
  { action = "open_link", url = "golem-test://item/12345" },
  { action = "wait", text = "Deep Link:", timeout = 5000 },
  { action = "assert_visible", text = "golem-test://item/12345", right_of = "Deep Link:" },
]
