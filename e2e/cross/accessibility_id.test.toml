[flow]
name = "Accessibility ID test (native app)"
tags = ["cross-platform", "accessibility-id", "native"]

[[flow.apps]]
name = "app-b"
bundle = "com.golem.test-b"

[[flow.apps.devices]]
os = "ios:latest"
type = "phone"

[[flow.apps.devices]]
os = "android:latest"
type = "phone"

[flow.options]
app_lifecycle = "reset"

[[block]]
name = "accessibility_id_selectors"
steps = [
  { action = "wait", on_text = "GOLEM Test B", timeout = 10000 },

  # Test on_accessibility_id — only works with native apps
  { action = "assert_visible", on = { accessibility_id = "app-b-title" } },
  { action = "assert_visible", on = { accessibility_id = "refresh-button" } },
  { action = "assert_visible", on = { accessibility_id = "counter-b" } },
  { action = "assert_visible", on = { accessibility_id = "toggle-b" } },

  # Interact using accessibility_id
  { action = "tap", on = { accessibility_id = "increment-b" } },
  { action = "tap", on = { accessibility_id = "increment-b" } },
  { action = "assert_visible", on = { text = "2", accessibility_id = "counter-b" } },

  # Test native toggle checked state
  # Tap twice: first tap may not register on all devices, second ensures state change
  { action = "tap", on = { text = "Test Toggle" } },
  { action = "assert_visible", on = { accessibility_id = "toggle-b", checked = true }, if_fail = "warn" },
]
