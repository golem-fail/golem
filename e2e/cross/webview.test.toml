[flow]
name = "Cross-platform WebView element interaction test"
tags = ["cross-platform", "webview", "interaction"]

[[flow.apps]]
name = "app"
# Multi-block form = pinned-tuple semantics. WebView rendering differs
# noticeably by form factor within each platform, so we deliberately
# target an iPad on iOS and a phone on Android rather than letting the
# scheduler pick axis-independent combos.
[[flow.apps.devices]]
os = "ios:latest"
type = "tablet"

[[flow.apps.devices]]
os = "android:latest"
type = "phone"

[[block]]
name = "webview_element_interaction"
steps = [
  # Verify core UI elements are visible (proxy for webview context loaded)
  { action = "assert_visible", on_text = "Enter email" },
  { action = "assert_visible", on_text = "Password" },
  { action = "assert_visible", on_text = "Search" },
  { action = "assert_visible", on_text = "Submit" },
  { action = "assert_visible", on_text = "Counter" },

  # Interact with text input elements inside the web view
  { action = "type", on_text = "Enter email", input = "webview@test.com" },
  { action = "assert_visible", on_text = "webview@test.com" },

  { action = "type", on_text = "Search", input = "webview search query" },
  { action = "assert_visible", on_text = "webview search query" },
  { action = "hide_keyboard" },

  # Interact with buttons inside the web view (may need scrolling after typing)
  { action = "tap", on_accessibility_label = "Increment", auto_scroll = true },
  { action = "tap", on_accessibility_label = "Increment" },
  { action = "assert_visible", on_text = "2", on_below = "Counter" },

  # Read values from web view elements
  { action = "read", on_below = "Counter", on_index = 0, save_to = "counter_value" },
  { action = "read", on_right_of = "Orientation:", save_to = "orientation" },
  { action = "read", on_right_of = "Theme:", save_to = "theme" },

  # Verify device state labels are rendered in the web view
  { action = "assert_visible", on_text = "Portrait", on_right_of = "Orientation:" },
  { action = "assert_visible", on_text = "Light", on_right_of = "Theme:" },

  # Scroll to find list elements
  { action = "assert_visible", on_text = "Item 0", auto_scroll = true },

  # Scroll back to the top
  { action = "assert_visible", on_text = "Submit", auto_scroll = true },

  # Take a screenshot to capture final web view state
  { action = "screenshot", path = "/tmp/golem-cross-webview.png" },
]
