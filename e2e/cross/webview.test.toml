[flow]
name = "Cross-platform WebView element interaction test"
tags = ["cross-platform", "webview", "interaction"]

[[flow.apps]]
name = "app"
bundle = "com.golem.test"

[[flow.apps.devices]]
os = "ios:latest"
type = "phone"

[[flow.apps.devices]]
os = "android:latest"
type = "phone"

[[block]]
name = "webview_element_interaction"
steps = [
  { action = "wait", text = "Submit", timeout = 10000 },

  # Verify core UI elements are visible (proxy for webview context loaded)
  { action = "assert_visible", text = "Enter email" },
  { action = "assert_visible", text = "Password" },
  { action = "assert_visible", text = "Search" },
  { action = "assert_visible", text = "Submit" },
  { action = "assert_visible", text = "Counter" },

  # Interact with text input elements inside the web view
  { action = "type", input = "Enter email", text = "webview@test.com" },
  { action = "assert_text", text = "webview@test.com" },

  { action = "type", input = "Search", text = "webview search query" },
  { action = "assert_text", text = "webview search query" },
  { action = "hide_keyboard" },

  # Interact with buttons inside the web view
  { action = "tap", text = "Increment" },
  { action = "tap", text = "Increment" },
  { action = "assert_text", text = "2", below = "Counter" },

  # Read values from web view elements
  { action = "read", below = "Counter", element_type = "text", save_to = "counter_value" },
  { action = "read", right_of = "Orientation:", save_to = "orientation" },
  { action = "read", right_of = "Theme:", save_to = "theme" },

  # Verify device state labels are rendered in the web view
  { action = "assert_text", text = "Portrait", right_of = "Orientation:" },
  { action = "assert_text", text = "Light", right_of = "Theme:" },

  # Scroll within the web view to find list elements
  { action = "swipe", direction = "down" },
  { action = "swipe", direction = "down" },
  { action = "wait", text = "list-item-0", timeout = 5000 },

  # Scroll back up to the top of the web view
  { action = "swipe", direction = "up" },
  { action = "swipe", direction = "up" },
  { action = "wait", text = "Submit", timeout = 5000 },

  # Take a screenshot to capture final web view state
  { action = "screenshot", path = "/tmp/golem-cross-webview.png" },
]
