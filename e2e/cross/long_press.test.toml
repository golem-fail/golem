[flow]
name = "Long press test"
tags = ["cross-platform", "interaction", "gesture"]

[[flow.apps]]
name = "app"
bundle = "com.golem.test"

[[flow.apps.devices]]
os = "ios:latest"
type = "phone"

[[flow.apps.devices]]
os = "android:latest"
type = "phone"

[[block]]
name = "long_press_tests"
steps = [
  # Long press on list item with default duration (1000ms)
  { action = "long_press", on_text = "list-item-0" },

  # Long press on submit button with custom duration
  { action = "long_press", on_text = "Submit", duration = 2000 },

  # Long press on a carousel card
  { action = "long_press", on_text = "carousel-item-0", duration = 1500 },
]
