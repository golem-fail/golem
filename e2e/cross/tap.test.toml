[flow]
name = "Tap test"
tags = ["cross-platform", "interaction", "smoke"]

[[flow.apps]]
name = "app"
[[flow.apps.devices]]
os = "ios:latest"
type = "phone"

[[flow.apps.devices]]
os = "android:latest"
type = "phone"

[[block]]
name = "tap_interactions"
steps = [
  { action = "tap", on_text = "Submit", timeout = 30000 },
  { action = "tap", on_text = "Action", on_index = 0 },
  { action = "tap", on_text = "+" },
  { action = "tap", on_text = "+" },
  { action = "tap", on_text = "-" },
]

# Verification differs by platform
[[block]]
name = "verify_android"
where = { os = "android" }
steps = [
  { action = "assert_visible", on_text = "Counter" },
]

[[block]]
name = "verify_ios"
where = { os = "ios" }
steps = [
  { action = "assert_visible", on_text = "1", on_below = "Counter" },
]
