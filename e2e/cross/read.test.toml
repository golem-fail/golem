[flow]
name = "Read element text test"
tags = ["cross-platform", "data", "variables"]

[[flow.apps]]
name = "app"
bundle = "com.golem.test"

[[flow.apps.devices]]
os = "ios:latest"
type = "phone"

[[flow.apps.devices]]
os = "android:latest"
type = "phone"

[[block]]
name = "read_and_save"
steps = [
  # Read the initial counter value and save it to a variable
  { action = "read", below = "Counter", element_type = "text", save_to = "initial_count" },

  # Increment the counter twice
  { action = "tap", text = "Increment" },
  { action = "tap", text = "Increment" },

  # Read the updated counter value
  { action = "read", below = "Counter", element_type = "text", save_to = "updated_count" },

  # Read the orientation label
  { action = "read", right_of = "Orientation:", save_to = "device_orientation" },

  # Read the theme label
  { action = "read", right_of = "Theme:", save_to = "current_theme" },

  # Read text from a list item
  { action = "read", text = "Item 0", save_to = "first_item_text" },

  # Verify the counter was updated correctly
  { action = "assert_visible", text = "2", below = "Counter" },
]
