[flow]
name = "Read element text test"
tags = ["cross-platform", "data", "variables"]

[[flow.apps]]
name = "app"
bundle = "com.golem.test"

[[flow.apps.devices]]
os = "ios:latest"
type = "phone"

[[flow.apps.devices]]
os = "android:latest"
type = "phone"

[[block]]
name = "read_and_save"
steps = [
  # Read the initial counter value and save it to a variable
  { action = "read", on_below = "Counter", on_index = 0, save_to = "initial_count" },

  # Increment the counter twice
  { action = "tap", on_text = "Increment" },
  { action = "tap", on_text = "Increment" },

  # Read the updated counter value
  { action = "read", on_below = "Counter", on_index = 0, save_to = "updated_count" },

  # Read the orientation label (off-screen, needs scroll)
  { action = "read", on_right_of = "Orientation:", save_to = "device_orientation", auto_scroll = true },

  # Read the theme label
  { action = "read", on_right_of = "Theme:", save_to = "current_theme", auto_scroll = true },

  # Read text from a list item
  { action = "read", on_text = "Item 0", save_to = "first_item_text" },

  # Verify the counter was updated correctly
  { action = "assert_visible", on_text = "2", on_below = "Counter" },
]
