[flow]
name = "Scroll test"
tags = ["cross-platform", "interaction", "scroll"]

[[flow.apps]]
name = "app"
bundle = "com.golem.test"

[[flow.apps.devices]]
os = "ios:latest"
type = "phone"

[[flow.apps.devices]]
os = "android:latest"
type = "phone"

[[block]]
name = "scroll_to_find_element"
steps = [
  # The first list item should be visible without scrolling
  { action = "assert_visible", on_text = "list-item-0" },

  # Scroll down repeatedly to reach items further in the list
  { action = "swipe", direction = "down" },
  { action = "swipe", direction = "down" },
  { action = "swipe", direction = "down" },
  { action = "swipe", direction = "down" },
  { action = "swipe", direction = "down" },

  # Verify a list item near the middle is now visible (using to = {} syntax)
  { action = "assert_visible", to = { text = "list-item-25" } },

  # Continue scrolling to find an item near the end
  { action = "swipe", direction = "down" },
  { action = "swipe", direction = "down" },
  { action = "swipe", direction = "down" },
  { action = "swipe", direction = "down" },
  { action = "swipe", direction = "down" },

  # Verify the last list item is reachable
  { action = "tap", on_text = "list-item-49" },

  # Scroll back to the top
  { action = "swipe", direction = "up" },
  { action = "swipe", direction = "up" },
  { action = "swipe", direction = "up" },
  { action = "swipe", direction = "up" },
  { action = "swipe", direction = "up" },
  { action = "swipe", direction = "up" },
  { action = "swipe", direction = "up" },
  { action = "swipe", direction = "up" },
  { action = "swipe", direction = "up" },
  { action = "swipe", direction = "up" },

  # Verify we are back at the top
  { action = "assert_visible", on_text = "list-item-0" },
]
