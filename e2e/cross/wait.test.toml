[flow]
name = "Wait and wait_not test"
tags = ["cross-platform", "synchronization"]

[[flow.apps]]
name = "app"
bundle = "com.golem.test"

[[flow.apps.devices]]
os = "ios:latest"
type = "phone"

[[flow.apps.devices]]
os = "android:latest"
type = "phone"

[[block]]
name = "wait_for_elements"
steps = [
  { action = "wait", on_text = "Submit" },
  { action = "wait", on_text = "Counter" },
]

# Test that auto_scroll works with polling — find an off-screen element
[[block]]
name = "scroll_and_tap"
steps = [
  # "Show Delayed" is at the bottom, needs scrolling (extra time for inner scroll lists)
  { action = "tap", on_text = "Show Delayed", auto_scroll = true, timeout = 30000 },

  # After tapping, wait for delayed text to appear (~3s)
  { action = "wait", on_text = "Delayed Text", auto_scroll = true },

  # Wait for it to disappear (~3s)
  { action = "wait_not", on_text = "Delayed Text" },
]
