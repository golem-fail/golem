[flow]
name = "Wait and wait_not test"
tags = ["cross-platform", "synchronization"]

[[flow.apps]]
name = "app"
[[flow.apps.devices]]
os = ["ios:latest", "android:latest"]
type = "phone"

[[block]]
name = "wait_for_elements"
steps = [
  { action = "wait", on_text = "Submit" },
  { action = "wait", on_text = "Counter" },
]

# `Show Delayed` lives in the Delayed Element section, well below the
# fold. Use the menu to jump there directly — much faster than
# auto_scroll past inner scrollables on iOS WebView.
[[block]]
name = "menu_nav_and_tap"
steps = [
  { action = "tap", on_accessibility_label = "menu-toggle" },
  { action = "tap", on_accessibility_label = "goto-delayed-element" },
  { action = "tap", on_text = "Show Delayed" },

  # After tapping, wait for delayed text to appear (~3s)
  { action = "wait", on_text = "Delayed Text" },

  # Wait for it to disappear (~3s)
  { action = "wait_not", on_text = "Delayed Text" },
]
