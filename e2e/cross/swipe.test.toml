[flow]
name = "Swipe test"
tags = ["cross-platform", "interaction", "gesture"]

[[flow.apps]]
name = "app"
[[flow.apps.devices]]
os = "ios:latest"
type = "phone"

[[flow.apps.devices]]
os = "android:latest"
type = "phone"

[[block]]
name = "swipe_all_directions"
steps = [
  # Swipe down to scroll the page
  { action = "swipe", direction = "down" },
  { action = "swipe", direction = "down" },

  # Swipe up to scroll back
  { action = "swipe", direction = "up" },

  # Swipe left on the carousel
  { action = "swipe", direction = "left" },
  { action = "swipe", direction = "left" },

  # Swipe right on the carousel to go back
  { action = "swipe", direction = "right" },

  # Verify we can still see a known element after swiping
  { action = "assert_visible", on_text = "Submit" },
]
