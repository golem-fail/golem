[flow]
name = "Keyboard test"
tags = ["cross-platform", "interaction", "keyboard"]

[[flow.apps]]
name = "app"
bundle = "com.golem.test"

[[flow.apps.devices]]
os = "ios:latest"
type = "phone"

[[flow.apps.devices]]
os = "android:latest"
type = "phone"

[[block]]
name = "keyboard_management"
steps = [
  { action = "wait", text = "Submit", timeout = 30000 },

  # Tap a text field to bring up the keyboard
  { action = "tap", text = "Enter email" },

  # Type some text (keyboard should be visible)
  { action = "type", input = "Enter email", text = "test@example.com" },

  # Dismiss the keyboard
  { action = "hide_keyboard" },

  # Tap another text field to bring the keyboard back
  { action = "tap", text = "Search" },
  { action = "type", input = "Search", text = "search query" },
]

# Dismiss keyboard: Android can use back button, iOS uses hide_keyboard
[[block]]
name = "dismiss_keyboard_android"
where = { os = "android" }
steps = [
  { action = "press", button = "back" },
]

[[block]]
name = "dismiss_keyboard_ios"
where = { os = "ios" }
steps = [
  { action = "hide_keyboard" },
]

[[block]]
name = "verify_text_persisted"
steps = [
  # Verify the typed text persisted after keyboard dismissal
  { action = "assert_visible", text = "test@example.com" },
  { action = "assert_visible", text = "search query" },
]
