[flow]
name = "Keyboard test"
tags = ["cross-platform", "interaction", "keyboard"]

[[flow.apps]]
name = "app"
[[flow.apps.devices]]
os = ["ios:latest", "android:latest"]
type = "phone"

[[block]]
name = "keyboard_management"
steps = [
  { action = "assert_visible", on_text = "Submit" },

  # Tap a text field to bring up the keyboard
  { action = "tap", on_text = "Enter email" },

  # Type some text (keyboard should be visible)
  { action = "type", on_text = "Enter email", input = "test@example.com" },

  # Dismiss the keyboard
  { action = "hide_keyboard" },

  # Tap another text field to bring the keyboard back
  { action = "tap", on_text = "Search" },
  { action = "type", on_text = "Search", input = "search query" },
]

# Dismiss keyboard: Android can use back button, iOS uses hide_keyboard
[[block]]
name = "dismiss_keyboard_android"
where = { os = "android" }
steps = [
  { action = "press", button = "back" },
]

[[block]]
name = "dismiss_keyboard_ios"
where = { os = "ios" }
steps = [
  { action = "hide_keyboard" },
]

[[block]]
name = "verify_text_persisted"
steps = [
  # Verify the typed text persisted after keyboard dismissal
  { action = "assert_visible", on_text = "test@example.com" },
  { action = "assert_visible", on_text = "search query" },
]
