[flow]
name = "Cross-platform multi-app switching with variable passing"
tags = ["cross-platform", "multi-app", "variables"]

[[flow.apps]]
name = "app"
bundle = "com.golem.test"

[[flow.apps.devices]]
os = "ios:latest"
type = "phone"

[[flow.apps.devices]]
os = "android:latest"
type = "phone"

[[flow.apps]]
name = "app-b"
bundle = "com.golem.test-b"

[[flow.apps.devices]]
os = "ios:latest"
type = "phone"

[[flow.apps.devices]]
os = "android:latest"
type = "phone"

[[block]]
name = "set_state_in_primary_app"
steps = [
  # Launch the primary app
  { action = "launch", app = "com.golem.test" },
  { action = "wait", text = "Submit", timeout = 10000 },

  # Set state by incrementing the counter
  { action = "tap", text = "Increment" },
  { action = "tap", text = "Increment" },
  { action = "tap", text = "Increment" },
  { action = "tap", text = "Increment" },
  { action = "tap", text = "Increment" },
  { action = "assert_text", text = "5", below = "Counter" },

  # Type into a form field to set additional state
  { action = "type", placeholder = "Enter email", text = "cross-test@golem.com" },
  { action = "hide_keyboard" },

  # Read the counter value into a variable for later verification
  { action = "read", below = "Counter", element_type = "text", save_to = "primary_counter" },
  { action = "read", placeholder = "Enter email", save_to = "primary_email" },
]

[[block]]
name = "switch_to_companion_and_verify"
steps = [
  # Switch to the companion app
  { action = "launch", app = "com.golem.test-b" },
  { action = "wait", text = "app-b-title", timeout = 10000 },

  # Verify companion app elements are visible
  { action = "assert_visible", text = "app-b-title" },
  { action = "assert_visible", text = "shared-data-display" },
  { action = "assert_visible", text = "refresh-button" },
  { action = "assert_visible", text = "status-label" },

  # Verify companion app initial state
  { action = "assert_text", text = "Ready", right_of = "Status:" },

  # Interact with the companion app
  { action = "tap", text = "refresh-button" },

  # Read companion app state
  { action = "read", text = "status-label", save_to = "companion_status" },
]

[[block]]
name = "switch_back_and_verify_state_preserved"
steps = [
  # Switch back to the primary app
  { action = "launch", app = "com.golem.test" },
  { action = "wait", text = "Counter", timeout = 10000 },

  # Verify primary app state is preserved after app switching
  { action = "assert_text", text = "5", below = "Counter" },
  { action = "assert_text", placeholder = "Enter email", text = "cross-test@golem.com" },

  # Verify UI elements are still enabled and functional
  { action = "assert_enabled", text = "Increment" },
  { action = "assert_enabled", text = "Decrement" },
  { action = "assert_enabled", text = "Submit" },

  # Perform one more interaction to confirm app is responsive
  { action = "tap", text = "Decrement" },
  { action = "assert_text", text = "4", below = "Counter" },

  # Stop the companion app
  { action = "stop", app = "com.golem.test-b" },
]
