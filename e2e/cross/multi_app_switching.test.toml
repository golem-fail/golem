[flow]
name = "Cross-platform multi-app switching with variable passing"
tags = ["cross-platform", "multi-app", "variables"]

[[flow.apps]]
name = "app"
[[flow.apps.devices]]
os = ["ios:latest", "android:latest"]
type = "phone"

[[flow.apps]]
name = "app-b"
bundle = "fail.golem.testb"
install_script = { ios = "scripts/install-app-b-ios.sh" , android = "scripts/install-app-b-android.sh" }

[[flow.apps.devices]]
os = ["ios:latest", "android:latest"]
type = "phone"

[[block]]
name = "set_state_in_primary_app"
steps = [
  # Set state by incrementing the counter
  { action = "tap", on_text = "+" },
  { action = "tap", on_text = "+" },
  { action = "tap", on_text = "+" },
  { action = "tap", on_text = "+" },
  { action = "tap", on_text = "+" },
  { action = "assert_visible", on_text = "5", on_below = "Counter" },

  # Type into a form field to set additional state
  { action = "type", on_text = "Enter email", input = "cross-test@example.com" },
  { action = "hide_keyboard" },

  # Read the counter value into a variable for later verification
  { action = "read", on_below = "Counter", on_index = 0, save_to = "primary_counter", auto_scroll = true },
  { action = "read", on_text = "cross-test@example.com", save_to = "primary_email" },
]

[[block]]
name = "switch_to_companion_and_verify"
steps = [
  # Switch to the companion app
  { action = "launch", app = "app-b" },
  # Verify companion app elements are visible
  { action = "assert_visible", on_text = "GOLEM Test B" },
  { action = "assert_visible", on_text = "Shared Data" },
  { action = "assert_visible", on_text = "Refresh" },
  { action = "assert_visible", on_text = "Ready" },

  # Verify native toggle checked state
  { action = "assert_checked", on_accessibility_label = "toggle-b", on_checked = false },
  { action = "tap", on_accessibility_label = "toggle-b" },
  { action = "assert_checked", on_accessibility_label = "toggle-b", on_checked = true },

  # Interact with the companion app
  { action = "tap", on_text = "Refresh" },

  # Read companion app state
  { action = "read", on_accessibility_label = "status-label", save_to = "companion_status" },
]

[[block]]
name = "switch_back_and_verify_state_preserved"
steps = [
  # Switch back to the primary app
  { action = "launch", app = "app" },
  # Verify primary app state is preserved after app switching
  { action = "assert_visible", on_text = "5", on_below = "Counter" },
  { action = "assert_visible", on_text = "cross-test@example.com" },

  # Verify UI elements are still enabled and functional
  { action = "assert_visible", on_text = "+", on_enabled = true },
  { action = "assert_visible", on_text = "-", on_enabled = true },
  { action = "assert_visible", on_text = "Submit", on_enabled = true },

  # Perform one more interaction to confirm app is responsive
  { action = "tap", on_text = "-" },
  { action = "assert_visible", on_text = "4", on_below = "Counter" },

  # Stop the companion app
  { action = "stop", app = "app-b" },
]
