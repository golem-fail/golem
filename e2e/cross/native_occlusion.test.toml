[flow]
name = "Native occlusion routing"
tags = ["android", "occlusion", "native"]

# test-app-b's occlusion fixture: an opaque, tappable overlay (drawn on top)
# covers the CENTRE of the "OCC Native" button, leaving the edges clear. A naive
# centre tap lands on the overlay → readout "occ:overlay"; the host-side native
# occlusion hit-test must route the tap to a clear edge → "occ:button". Paint
# order comes from getDrawingOrder on Android, snapshot tree order on iOS — both
# exercised here. (Android prunes the occluded text node, so target by
# accessibility_label, which survives on both platforms.)
[[flow.apps]]
name = "app-b"
bundle = "fail.golem.testb"
install_script = { ios = "scripts/install-app-b-ios.sh", android = "scripts/install-app-b-android.sh" }
[[flow.apps.devices]]
os = ["ios:latest", "android:latest"]
type = "phone"

[[block]]
name = "route_around_native_overlay"
steps = [
  { action = "assert_visible", on_text = "occ:none" },
  # Target by accessibility_label: Android prunes the occluded TEXT node (the
  # button label sits under the centre overlay), but keeps the button itself a
  # full-bounds clickable element — so the host-side hit-test routes the tap to
  # a clear edge and fires it.
  { action = "tap", on_accessibility_label = "occ-button" },
  { action = "assert_visible", on_text = "occ:button", timeout = 5000 },
]
