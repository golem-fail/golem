[flow]
name = "Multi-app test"
tags = ["cross-platform", "multi-app"]

[[flow.apps]]
name = "app"
bundle = "fail.golem.test"

[[flow.apps.devices]]
os = "ios:latest"
type = "phone"

[[flow.apps.devices]]
os = "android:latest"
type = "phone"

[[flow.apps]]
name = "app-b"
bundle = "fail.golem.testb"

[[flow.apps.devices]]
os = "ios:latest"
type = "phone"

[[flow.apps.devices]]
os = "android:latest"
type = "phone"

[[block]]
name = "switch_between_apps"
steps = [
  # Interact with the primary app
  { action = "tap", on_text = "+" },
  { action = "tap", on_text = "+" },
  { action = "tap", on_text = "+" },
  { action = "assert_visible", on_text = "3", on_below = "Counter" },

  # Switch to the companion app
  { action = "launch", app = "app-b" },
  { action = "assert_visible", on_accessibility_label = "app-b-title" },
  { action = "assert_visible", on_text = "Shared Data" },
  { action = "assert_visible", on_text = "Refresh" },
  { action = "assert_visible", on_text = "Ready" },

  # Tap refresh in companion app
  { action = "tap", on_text = "Refresh" },

  # Switch back to the primary app
  { action = "launch", app = "app" },
  # Verify primary app state is intact
  { action = "assert_visible", on_text = "3", on_below = "Counter" },

  # Stop the companion app
  { action = "stop", app = "app-b" },
]
