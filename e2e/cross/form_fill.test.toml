[flow]
name = "Cross-platform complete form fill flow"
tags = ["cross-platform", "form", "text-input", "interaction"]

[flow.options]
# Form layout is a regression matrix — every (platform × type) combo
# needs independent validation, so force Cartesian expansion.
coverage = "full"

[flow.vars]
# Generated email — exercises the fake:email generator on-device. Declared as a
# var (not inline) so the type, assert, and later read-back all reference the
# identical seed-deterministic value.
email = "${fake:email}"

[[flow.apps]]
name = "app"
[[flow.apps.devices]]
os = ["ios:latest", "android:latest"]
type = ["phone", "tablet"]

[[block]]
name = "fill_form_fields"
steps = [
  # Type a generated email into the email field and verify
  { action = "type", on_text = "Enter email", input = "${email}" },
  { action = "assert_visible", on_text = "${email}" },

  # Type into the password field
  { action = "type", on_text = "Password", input = "P@ssw0rd!123" },

  # Type into the search field with a deliberate typo
  { action = "type", on_text = "Search", input = "golem testt" },
  { action = "assert_visible", on_text = "golem testt" },

  # Use backspace to correct the typo (field now shows "golem testt")
  { action = "backspace", count = 1 },
  { action = "assert_visible", on_text = "golem test" },

  # Type the correct ending (field now shows "golem test")
  { action = "type", on_text = "golem test", input = " query" },
  { action = "assert_visible", on_text = "golem test query" },

  # Hide the keyboard
  { action = "hide_keyboard" },
]

[[block]]
name = "fill_multiline_and_submit"
steps = [
  # Type into the multiline text area
  { action = "type", on_text = "Multi-line text", input = "First line of input\nSecond line with details\nThird line conclusion" },

  # Verify multiline content was typed (glob matches across the text)
  { action = "assert_visible", on_text = "First line*" },
  { action = "assert_visible", on_text = "*Second line*" },
  { action = "assert_visible", on_text = "*Third line*" },

  # Hide the keyboard
  { action = "hide_keyboard" },

  # Read back form values to verify (fields show typed content)
  { action = "read", on_text = "${email}", save_to = "filled_email" },
  { action = "read", on_text = "golem test query", save_to = "filled_search" },

  # Take a screenshot before submitting
  { action = "screenshot", path = "/tmp/golem-cross-form-filled.png" },

  # Verify the submit button is enabled (may need scrolling after typing)
  { action = "assert_visible", on_text = "Submit", on_enabled = true, auto_scroll = true },

  # Submit the form
  { action = "tap", on_text = "Submit" },

  # Take a screenshot after submission
  { action = "screenshot", path = "/tmp/golem-cross-form-submitted.png" },
]
