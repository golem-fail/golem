[flow]
name = "Cross-platform counter interaction and assertions"
tags = ["cross-platform", "counter", "assertions", "interaction"]

[[flow.apps]]
name = "app"
bundle = "com.golem.test"

[[flow.apps.devices]]
os = "ios:latest"
type = "phone"

[[flow.apps.devices]]
os = "android:latest"
type = "phone"

[[block]]
name = "verify_initial_state"
steps = [
  { action = "wait", text = "Counter", timeout = 10000 },

  # Verify the counter starts at zero
  { action = "assert_text", text = "0", below = "Counter" },

  # Verify both buttons are visible and enabled
  { action = "assert_visible", text = "Increment" },
  { action = "assert_visible", text = "Decrement" },
  { action = "assert_enabled", text = "Increment" },
  { action = "assert_enabled", text = "Decrement" },
]

[[block]]
name = "increment_counter"
steps = [
  # Increment the counter five times
  { action = "tap", text = "Increment" },
  { action = "assert_text", text = "1", below = "Counter" },
  { action = "tap", text = "Increment" },
  { action = "assert_text", text = "2", below = "Counter" },
  { action = "tap", text = "Increment" },
  { action = "assert_text", text = "3", below = "Counter" },
  { action = "tap", text = "Increment" },
  { action = "tap", text = "Increment" },
  { action = "assert_text", text = "5", below = "Counter" },

  # Read and save the counter value
  { action = "read", below = "Counter", element_type = "text", save_to = "count_after_increment" },
]

[[block]]
name = "decrement_counter"
steps = [
  # Decrement the counter three times
  { action = "tap", text = "Decrement" },
  { action = "assert_text", text = "4", below = "Counter" },
  { action = "tap", text = "Decrement" },
  { action = "assert_text", text = "3", below = "Counter" },
  { action = "tap", text = "Decrement" },
  { action = "assert_text", text = "2", below = "Counter" },

  # Read and save the counter value after decrement
  { action = "read", below = "Counter", element_type = "text", save_to = "count_after_decrement" },
]

[[block]]
name = "verify_button_states"
steps = [
  # Verify buttons remain enabled at count = 2
  { action = "assert_enabled", text = "Increment" },
  { action = "assert_enabled", text = "Decrement" },

  # Decrement to zero
  { action = "tap", text = "Decrement" },
  { action = "tap", text = "Decrement" },
  { action = "assert_text", text = "0", below = "Counter" },

  # Verify the counter display shows zero
  { action = "assert_visible", text = "Counter" },
  { action = "assert_text", text = "0", below = "Counter" },

  # Verify increment button is still enabled at zero
  { action = "assert_enabled", text = "Increment" },

  # Increment once more to confirm functionality after reaching zero
  { action = "tap", text = "Increment" },
  { action = "assert_text", text = "1", below = "Counter" },
]
