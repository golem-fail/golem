[flow]
name = "Cross-platform counter interaction and assertions"
tags = ["cross-platform", "counter", "assertions", "interaction"]

[[flow.apps]]
name = "app"
[[flow.apps.devices]]
os = ["ios:latest", "android:latest"]
type = "phone"

[[block]]
name = "verify_initial_state"
steps = [
  # Verify the counter starts at zero
  { action = "assert_visible", on_text = "0", on_below = "Counter" },

  # Verify both buttons are visible and enabled
  { action = "assert_visible", on_accessibility_label = "Increment" },
  { action = "assert_visible", on_accessibility_label = "Decrement" },
  { action = "assert_visible", on_accessibility_label = "Increment", on_enabled = true },
  { action = "assert_visible", on_accessibility_label = "Decrement", on_enabled = true },
]

[[block]]
name = "increment_counter"
steps = [
  # Increment the counter five times
  { action = "tap", on_accessibility_label = "Increment" },
  { action = "assert_visible", on_text = "1", on_below = "Counter" },
  { action = "tap", on_accessibility_label = "Increment" },
  { action = "assert_visible", on_text = "2", on_below = "Counter" },
  { action = "tap", on_accessibility_label = "Increment" },
  { action = "assert_visible", on_text = "3", on_below = "Counter" },
  { action = "tap", on_accessibility_label = "Increment" },
  { action = "tap", on_accessibility_label = "Increment" },
  { action = "assert_visible", on_text = "5", on_below = "Counter" },

  # Read and save the counter value
  { action = "read", on_below = "Counter", on_index = 0, save_to = "count_after_increment" },
]

[[block]]
name = "decrement_counter"
steps = [
  # Decrement the counter three times
  { action = "tap", on_accessibility_label = "Decrement" },
  { action = "assert_visible", on_text = "4", on_below = "Counter" },
  { action = "tap", on_accessibility_label = "Decrement" },
  { action = "assert_visible", on_text = "3", on_below = "Counter" },
  { action = "tap", on_accessibility_label = "Decrement" },
  { action = "assert_visible", on_text = "2", on_below = "Counter" },

  # Read and save the counter value after decrement
  { action = "read", on_below = "Counter", on_index = 0, save_to = "count_after_decrement" },
]

[[block]]
name = "verify_button_states"
steps = [
  # Verify buttons remain enabled at count = 2
  { action = "assert_visible", on_accessibility_label = "Increment", on_enabled = true },
  { action = "assert_visible", on_accessibility_label = "Decrement", on_enabled = true },

  # Decrement to zero
  { action = "tap", on_accessibility_label = "Decrement" },
  { action = "tap", on_accessibility_label = "Decrement" },
  { action = "assert_visible", on_text = "0", on_below = "Counter" },

  # Verify the counter display shows zero
  { action = "assert_visible", on_text = "Counter" },
  { action = "assert_visible", on_text = "0", on_below = "Counter" },

  # Verify increment button is still enabled at zero
  { action = "assert_visible", on_accessibility_label = "Increment", on_enabled = true },

  # Increment once more to confirm functionality after reaching zero
  { action = "tap", on_accessibility_label = "Increment" },
  { action = "assert_visible", on_text = "1", on_below = "Counter" },
]
