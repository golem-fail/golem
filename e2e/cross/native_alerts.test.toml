[flow]
name = "Native alert dialog test"
tags = ["cross-platform", "alert", "dialog"]

[[flow.apps]]
name = "app"
bundle = "fail.golem.test"

[[flow.apps.devices]]
os = "ios:latest"
type = "phone"

[[flow.apps.devices]]
os = "android:latest"
type = "phone"

# Alert dialog: single OK button
[[block]]
name = "alert_accept"
steps = [
  { action = "assert_visible", on_text = "Submit" },
  { action = "tap", on_text = "Show Alert", auto_scroll = true },
  { action = "assert_alert" },
  { action = "assert_alert", on_text = "This is a test alert" },
  { action = "accept_alert" },
  { action = "assert_visible", on_text = "Alert dismissed" },
]

# Confirm dialog: OK and Cancel buttons
[[block]]
name = "confirm_accept"
steps = [
  { action = "tap", on_text = "Show Confirm" },
  { action = "assert_alert" },
  { action = "assert_alert", on_text = "Are you sure?" },
  { action = "accept_alert" },
  { action = "assert_visible", on_text = "Confirm OK" },
]

[[block]]
name = "confirm_dismiss"
steps = [
  { action = "tap", on_text = "Show Confirm" },
  { action = "assert_alert" },
  { action = "dismiss_alert" },
  { action = "assert_visible", on_text = "Confirm Cancel" },
]

# Yes/No dialog
[[block]]
name = "yes_no_accept"
steps = [
  { action = "tap", on_text = "Show Yes/No" },
  { action = "assert_alert" },
  { action = "assert_alert", on_text = "Do you agree?" },
  { action = "accept_alert" },
  { action = "assert_visible", on_text = "Question Yes" },
]

[[block]]
name = "yes_no_dismiss"
steps = [
  { action = "tap", on_text = "Show Yes/No" },
  { action = "assert_alert" },
  { action = "dismiss_alert" },
  { action = "assert_visible", on_text = "Question No" },
]
