[flow]
name = "Type and backspace test"
tags = ["cross-platform", "interaction", "text-input"]

[[flow.apps]]
name = "app"
bundle = "com.golem.test"

[[flow.apps.devices]]
os = "ios:latest"
type = "phone"

[[flow.apps.devices]]
os = "android:latest"
type = "phone"

[[block]]
name = "type_into_fields"
steps = [
  # Type into the email field
  { action = "type", input = "Enter email", on_text = "user@example.com" },
  { action = "assert_visible", on_text = "user@example.com" },

  # Type into the password field
  { action = "type", input = "Password", on_text = "s3cret!" },

  # Type into the search field
  { action = "type", input = "Search", on_text = "hello world" },

  # Backspace to correct a typo in search
  { action = "backspace", on_text = "Search", count = 5 },
  { action = "type", input = "Search", on_text = "earth" },

  # Type into the multiline text area
  { action = "type", input = "Multi-line text", on_text = "Line one\nLine two\nLine three" },

  # Hide the keyboard after typing
  { action = "hide_keyboard" },
]
