[flow]
name = "Selector coverage"
tags = ["cross-platform", "selectors"]

# Exercises every selector facet at least once: text, accessibility_label,
# index, traits, the four directional relationals (with their column/row
# overlap requirement), the geometric `contains`/`inside`, a nested anchor
# (selector group, not bare text), and `within = { contains }` for scrolling
# inside the box that holds a target. Sections are visited top→down so page
# scrolls always move forward.
[[flow.apps]]
name = "app"
# Run on both form factors: on tablet the app reflows into a multi-column
# grid, so passing here proves selectors resolve the same elements under a
# shifted layout (coordinate-driven, not DOM-structural).
[[flow.apps.devices]]
os = ["ios:latest", "android:latest"]
type = ["phone", "tablet"]

# Top of page: Counter + Buttons.
[[block]]
name = "basic"
steps = [
  # text (visible label) — Counter heading is on screen at launch.
  { action = "assert_visible", on_text = "Counter" },
  # accessibility_label — the Counter's increment control (aria-label, not text).
  { action = "assert_visible", on_accessibility_label = "Increment" },
  # accessibility_label + geometric/content traits — the square "-" button.
  { action = "assert_visible", on = { accessibility_label = "Decrement", traits = ["button", "square"] } },
  # large / tall / no_text traits — the full-app container.
  { action = "assert_visible", on = { accessibility_label = "app", traits = ["large", "tall", "no_text"] } },
  # Bring the Buttons section into view.
  { action = "scroll", to = { text = "Submit" } },
  # text + multiple traits (AND) — Submit is a wide, short-text button.
  { action = "assert_visible", on = { text = "Submit", traits = ["button", "wide", "short_text"] } },
  # index — the Buttons section has two "Action" buttons; pick the second.
  { action = "assert_visible", on = { text = "Action", index = 1 } },
]

# Middle of page: the Scroll List — geometric containment + within scroll.
[[block]]
name = "containment"
steps = [
  { action = "scroll", to = { text = "Item 0" } },
  # contains — resolves the box that encloses "Item 0" (smallest enclosing
  # element; here the list container). Selection, not scrolling.
  { action = "assert_visible", on = { contains = { text = "Item 0" } } },
  # inside — an item enclosed by the labelled scroll-list section.
  { action = "assert_visible", on = { text = "Item 0", inside = { accessibility_label = "section-scroll-list" } } },
]

# Lower on page: Nested Layout — directional relationals + nested anchor.
[[block]]
name = "relational"
steps = [
  { action = "scroll", to = { text = "Footer Text" } },
  # right_of / left_of — Left and Right sit side by side (row overlap holds).
  { action = "assert_visible", on = { text = "Right", right_of = "Left" } },
  { action = "assert_visible", on = { text = "Left", left_of = "Right" } },
  # below / above — App Title above Footer Text within the section.
  { action = "assert_visible", on = { text = "Footer Text", below = "App Title" } },
  { action = "assert_visible", on = { text = "App Title", above = "Footer Text" } },
  # nested anchor (one level): the anchor is a selector group, not bare text.
  { action = "assert_visible", on = { text = "Left", below = { text = "Nested Layout", traits = ["has_text"] } } },
]
