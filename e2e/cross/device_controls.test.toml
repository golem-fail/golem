[flow]
name = "Cross-platform device controls test"
tags = ["cross-platform", "device", "controls", "dark-mode"]

[[flow.apps]]
name = "app"
[[flow.apps.devices]]
os = ["ios:latest", "android:latest"]
type = "phone"

[[block]]
name = "initial_state"
steps = [
  # iOS / Android system dark-mode is device-level state and persists
  # across app launches. A prior run that toggled it on would leak
  # into the next run's "initial" assertion. Reset before asserting.
  { action = "dark_mode", enabled = false },

  # Jump to Device State via the menu rather than swiping ~3000px
  # past every preceding section — scroll is not what this flow tests.
  { action = "tap", on_accessibility_label = "menu-toggle" },
  { action = "tap", on_accessibility_label = "goto-device-state" },
  { action = "assert_visible", on_text = "Light", on_right_of = "Theme:" },
  { action = "assert_visible", on_text = "0.0, 0.0", on_right_of = "Location:" },

  # Press the home button and re-launch
  { action = "press", button = "home" },
  { action = "launch", app = "app" },
  { action = "assert_visible", on_text = "Theme:", auto_scroll = true },
]

# Android-only: test back button navigation
[[block]]
name = "android_back_button"
where = { os = "android" }
steps = [
  { action = "press", button = "back" },
  { action = "launch", app = "app" },
  { action = "assert_visible", on_text = "Theme:", auto_scroll = true },
]

[[block]]
name = "dark_mode_controls"
steps = [
  # Jump to Device State to read Theme.
  { action = "tap", on_accessibility_label = "menu-toggle" },
  { action = "tap", on_accessibility_label = "goto-device-state" },
  { action = "assert_visible", on_text = "Light", on_right_of = "Theme:" },

  # Enable dark mode and verify
  { action = "dark_mode", enabled = true },
  { action = "assert_visible", on_text = "Dark", on_right_of = "Theme:" },

  # Take a screenshot in dark mode
  { action = "screenshot", path = "/tmp/golem-cross-dark-mode.png" },

  # Verify Counter still works in dark mode — jump to it via menu.
  { action = "tap", on_accessibility_label = "menu-toggle" },
  { action = "tap", on_accessibility_label = "goto-counter" },
  { action = "tap", on_text = "+" },
  { action = "assert_visible", on_text = "1", on_below = "Counter" },

  # Back to Device State to verify return to light theme.
  { action = "tap", on_accessibility_label = "menu-toggle" },
  { action = "tap", on_accessibility_label = "goto-device-state" },
  { action = "dark_mode", enabled = false },
  { action = "assert_visible", on_text = "Light", on_right_of = "Theme:" },
]

[[block]]
name = "location_controls"
steps = [
  # Jump to Device State.
  { action = "tap", on_accessibility_label = "menu-toggle" },
  { action = "tap", on_accessibility_label = "goto-device-state" },
  { action = "assert_visible", on_text = "0.0, 0.0", on_right_of = "Location:" },

  # Set GPS location to San Francisco
  { action = "set_location", latitude = 37.7749, longitude = -122.4194 },
  { action = "assert_visible", on_text = "37.7749, -122.4194", on_right_of = "Location:" },

  # Set GPS location to Tokyo
  { action = "set_location", latitude = 35.6762, longitude = 139.6503 },
  { action = "assert_visible", on_text = "35.6762, 139.6503", on_right_of = "Location:" },

  # Set GPS location to London
  { action = "set_location", latitude = 51.5074, longitude = -0.1278 },
  { action = "assert_visible", on_text = "51.5074, -0.1278", on_right_of = "Location:" },

  # Read the final location value
  { action = "read", on_right_of = "Location:", save_to = "final_location" },
]
