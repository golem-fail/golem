[flow]
name = "Cross-platform device controls test"
tags = ["cross-platform", "device", "controls", "rotation", "dark-mode"]

[[flow.apps]]
name = "app"
bundle = "fail.golem.test"

[[flow.apps.devices]]
os = "ios:latest"
type = "phone"

[[flow.apps.devices]]
os = "android:latest"
type = "phone"

[[block]]
name = "initial_state"
steps = [
  { action = "assert_visible", on_text = "Portrait", on_right_of = "Orientation:", auto_scroll = true, timeout = 60000 },
  { action = "assert_visible", on_text = "Light", on_right_of = "Theme:", auto_scroll = true },
  { action = "assert_visible", on_text = "0.0, 0.0", on_right_of = "Location:", auto_scroll = true },

  # Press the home button and re-launch
  { action = "press", button = "home" },
  { action = "launch", app = "app" },
  { action = "assert_visible", on_text = "Orientation:", auto_scroll = true, timeout = 60000 },
]

# Android-only: test back button navigation
[[block]]
name = "android_back_button"
where = { os = "android" }
steps = [
  { action = "press", button = "back" },
  { action = "launch", app = "app" },
  { action = "assert_visible", on_text = "Orientation:", auto_scroll = true, timeout = 60000 },
]

[[block]]
name = "orientation_controls"
steps = [
  # Verify initial portrait orientation (using nested anchor syntax)
  { action = "assert_visible", on = { text = "Portrait", right_of = { text = "Orientation:" } }, auto_scroll = true, timeout = 60000 },

  # Rotate to landscape and verify
  { action = "rotate", orientation = "landscape" },
  { action = "assert_visible", on_text = "Landscape", on_right_of = "Orientation:" },

  # Verify core elements are still accessible in landscape
  { action = "assert_visible", on_text = "Submit" },
  { action = "assert_visible", on_text = "Counter" },

  # Rotate back to portrait and verify
  { action = "rotate", orientation = "portrait" },
  { action = "assert_visible", on_text = "Portrait", on_right_of = "Orientation:" },
]

[[block]]
name = "dark_mode_controls"
steps = [
  # Verify initial light theme
  { action = "assert_visible", on_text = "Light", on_right_of = "Theme:", auto_scroll = true, timeout = 60000 },

  # Enable dark mode and verify
  { action = "dark_mode", enabled = true },
  { action = "assert_visible", on_text = "Dark", on_right_of = "Theme:" },

  # Take a screenshot in dark mode
  { action = "screenshot", path = "/tmp/golem-cross-dark-mode.png" },

  # Verify elements are still functional in dark mode
  { action = "tap", on_text = "+" },
  { action = "assert_visible", on_text = "1", on_below = "Counter" },

  # Disable dark mode and verify return to light theme
  { action = "dark_mode", enabled = false },
  { action = "assert_visible", on_text = "Light", on_right_of = "Theme:" },
]

[[block]]
name = "location_controls"
steps = [
  # Verify initial location
  { action = "assert_visible", on_text = "0.0, 0.0", on_right_of = "Location:", auto_scroll = true, timeout = 60000 },

  # Set GPS location to San Francisco
  { action = "set_location", latitude = 37.7749, longitude = -122.4194 },
  { action = "assert_visible", on_text = "37.7749, -122.4194", on_right_of = "Location:" },

  # Set GPS location to Tokyo
  { action = "set_location", latitude = 35.6762, longitude = 139.6503 },
  { action = "assert_visible", on_text = "35.6762, 139.6503", on_right_of = "Location:" },

  # Set GPS location to London
  { action = "set_location", latitude = 51.5074, longitude = -0.1278 },
  { action = "assert_visible", on_text = "51.5074, -0.1278", on_right_of = "Location:" },

  # Read the final location value
  { action = "read", on_right_of = "Location:", save_to = "final_location" },
]
