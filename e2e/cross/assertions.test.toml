[flow]
name = "Assertions test"
tags = ["cross-platform", "assertions", "smoke"]

[[flow.apps]]
name = "app"
bundle = "com.golem.test"

[[flow.apps.devices]]
os = "ios:latest"
type = "phone"

[[flow.apps.devices]]
os = "android:latest"
type = "phone"

[[block]]
name = "visibility_assertions"
steps = [
  { action = "wait", text = "Submit", timeout = 30000 },

  # assert_visible: elements that should be on screen
  { action = "assert_visible", text = "Submit" },
  { action = "assert_visible", text = "Enter email" },
  { action = "assert_visible", text = "Counter" },

  # assert_not_visible: elements that should not be on screen
  { action = "assert_not_visible", text = "GOLEM Test B" },
  { action = "assert_not_visible", text = "app-b-title" },

  # assert_visible: verify exact text content using relational selectors
  { action = "assert_visible", text = "0", below = "Counter" },
  { action = "assert_visible", text = "Item 0", child_of = "list-item-0" },
  { action = "assert_visible", text = "Item 3", child_of = "list-item-3" },

  # assert_visible with enabled: verify elements are enabled
  { action = "assert_visible", text = "Submit", enabled = true },
  { action = "assert_visible", text = "Increment", enabled = true },
  { action = "assert_visible", text = "Enter email", enabled = true },
  { action = "assert_visible", text = "dark-mode-toggle", enabled = true, auto_scroll = true },

  # assert_visible with checked: scroll to toggles, toggle checkbox and verify
  { action = "tap", text = "agree-checkbox", auto_scroll = true },
  # WebView checkboxes don't reliably propagate checked state to iOS accessibility
  { action = "assert_visible", text = "agree-checkbox", checked = true, on_fail = "warn" },
]
