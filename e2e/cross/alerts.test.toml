[flow]
name = "Alerts test"
tags = ["cross-platform", "interaction", "alerts"]

[[flow.apps]]
name = "app"
[[flow.apps.devices]]
os = ["ios:latest", "android:latest"]
type = "phone"

# iOS UIAlertController buttons live in the XCUI accessibility tree,
# NOT in the WebView's DOM — so plain `tap on_text = "OK"` doesn't
# resolve them on iOS. Use `accept_alert` / `dismiss_alert` for the
# native dialog buttons (positive = accept, negative = dismiss).
# Android's native AlertDialog has the same property, so the same
# actions are the cross-platform path.

[[block]]
name = "alert_tests"
steps = [
  { action = "assert_visible", on_text = "Submit" },

  # Trigger a simple alert (button is off-screen, use auto_scroll)
  { action = "tap", on_text = "Show Alert", auto_scroll = true },

  # Dismiss the alert via its positive button (OK).
  { action = "accept_alert" },

  # Trigger a confirmation dialog and accept it
  { action = "tap", on_text = "Show Confirm" },
  { action = "accept_alert" },

  # Trigger the confirmation dialog again and dismiss it (Cancel).
  { action = "tap", on_text = "Show Confirm" },
  { action = "dismiss_alert" },

  # Trigger a Yes/No dialog and accept (Yes).
  { action = "tap", on_text = "Show Yes/No" },
  { action = "accept_alert" },

  # Trigger a Yes/No dialog and dismiss (No).
  { action = "tap", on_text = "Show Yes/No" },
  { action = "dismiss_alert" },
]
