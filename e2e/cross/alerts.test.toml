[flow]
name = "Alerts test"
tags = ["cross-platform", "interaction", "alerts"]

[[flow.apps]]
name = "app"
bundle = "com.golem.test"

[[flow.apps.devices]]
os = "ios:latest"
type = "phone"

[[flow.apps.devices]]
os = "android:latest"
type = "phone"

[[block]]
name = "alert_tests"
steps = [
  { action = "wait", on_text = "Submit", timeout = 30000 },

  # Trigger a simple alert (button is off-screen, use auto_scroll)
  { action = "tap", on_text = "alert-button", auto_scroll = true },

  # Wait for the alert to appear and dismiss it
  { action = "wait", on_text = "OK", timeout = 5000 },
  { action = "tap", on_text = "OK" },

  # Trigger a confirmation dialog
  { action = "tap", on_text = "confirm-button" },

  # Wait for the confirm dialog and accept it
  { action = "wait", on_text = "Confirm", timeout = 5000 },
  { action = "tap", on_text = "Confirm" },

  # Trigger the confirmation dialog again and cancel it
  { action = "tap", on_text = "confirm-button" },
  { action = "wait", on_text = "Cancel", timeout = 5000 },
  { action = "tap", on_text = "Cancel" },

  # Trigger an action sheet
  { action = "tap", on_text = "action-sheet-button" },
  { action = "wait", on_text = "Action Sheet", timeout = 5000 },
]

# Dismiss action sheet: Android uses back button, iOS taps Cancel
[[block]]
name = "dismiss_action_sheet_android"
where = { os = "android" }
steps = [
  { action = "press", button = "back" },
]

[[block]]
name = "dismiss_action_sheet_ios"
where = { os = "ios" }
steps = [
  { action = "tap", on_text = "Cancel" },
]
