[flow]
name = "Alerts test"
tags = ["cross-platform", "interaction", "alerts"]

[[flow.apps]]
name = "app"
[[flow.apps.devices]]
os = "ios:latest"
type = "phone"

[[flow.apps.devices]]
os = "android:latest"
type = "phone"

[[block]]
name = "alert_tests"
steps = [
  { action = "assert_visible", on_text = "Submit", timeout = 30000 },

  # Trigger a simple alert (button is off-screen, use auto_scroll)
  { action = "tap", on_text = "Show Alert", auto_scroll = true },

  # Dismiss the alert
  { action = "tap", on_text = "OK" },

  # Trigger a confirmation dialog and accept it
  { action = "tap", on_text = "Show Confirm" },
  { action = "tap", on_text = "Confirm" },

  # Trigger the confirmation dialog again and cancel it
  { action = "tap", on_text = "Show Confirm" },
  { action = "tap", on_text = "Cancel" },

  # Trigger an action sheet
  { action = "tap", on_text = "Action Sheet" },
  { action = "assert_visible", on_text = "Action Sheet" },
]

# Dismiss action sheet: Android uses back button, iOS taps Cancel
[[block]]
name = "dismiss_action_sheet_android"
where = { os = "android" }
steps = [
  { action = "press", button = "back" },
]

[[block]]
name = "dismiss_action_sheet_ios"
where = { os = "ios" }
steps = [
  { action = "tap", on_text = "Cancel" },
]
