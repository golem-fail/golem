# iOS device display data: cutout rects and corner radii.
#
# Detects physical dead zones (notches, Dynamic Island, rounded corners).
# Coordinates in points, portrait, origin top-left.
#
# Cutout x is computed at runtime as (screen_width - width) / 2 when
# centered = true (default). Explicit [x, y, width, height] for non-centered.
#
# Keys are model identifier prefixes — longest match wins.
# "iPhone10" matches iPhone10,1, iPhone10,3, iPhone10,6 etc.

# =============================================================================
# iPhone X / XS family — notch 209x31, r=39
# iPhone10,1/4 = iPhone 8/8+ (no notch, no rounded corners — not listed)
# iPhone10,3/6 = iPhone X
# =============================================================================

["iPhone10,3"]
# iPhone X (Global) — 375x812
cutout_size = [209, 31]
corner_radius = 39

["iPhone10,6"]
# iPhone X (GSM) — 375x812
cutout_size = [209, 31]
corner_radius = 39

