name: Release note

# Ensure every human PR carries a release-notes block (feeds scripts/release-notes.sh).
# This is a REQUIRED status check, so the job must ALWAYS run and always report a
# conclusion — a job skipped via a job-level `if:` leaves the required check
# "expected" forever and blocks the PR. So the bot / `no-release-note` exemption
# lives inside the step (exit 0), not in a job condition.

on:
  pull_request:
    types: [opened, edited, synchronize, labeled, unlabeled]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-slim
    steps:
      - name: Require a release-notes block
        env:
          BODY: ${{ github.event.pull_request.body }}
          AUTHOR: ${{ github.event.pull_request.user.login }}
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: |
          set -euo pipefail

          # Exemptions (still report success so the required check is satisfied):
          case "$AUTHOR" in
            *'[bot]') echo "Bot PR ($AUTHOR) — deps come from the lockfile diff; exempt."; exit 0 ;;
          esac
          case ",$LABELS," in
            *,no-release-note,*) echo "'no-release-note' label — exempt."; exit 0 ;;
          esac

          # Extract the block interior, then strip HTML comments (single/multi-line)
          # so leftover template guidance never counts as a real note.
          block="$(printf '%s\n' "$BODY" \
            | awk '/<!-- *release-notes *-->/{f=1;next} /<!-- *\/release-notes *-->/{f=0} f' \
            | awk '{ l=$0
                     if (inc) { if (l ~ /-->/) { sub(/.*-->/,"",l); inc=0 } else next }
                     gsub(/<!--.*-->/,"",l)
                     if (l ~ /<!--/) { sub(/<!--.*/,"",l); inc=1 }
                     print l }')"
          if printf '%s\n' "$block" | grep -qE '^[[:space:]]*-?[[:space:]]*(breaking|added|feat|improved|improve|changed|change|perf|fixed|fix|security|sec|deprecated|deprecate|internal|dev|chore):[[:space:]]*[^[:space:]]'; then
            echo "✓ release-notes block present."
          else
            echo "::error::No release-notes block with a category line (breaking/added/improved/fixed/security/deprecated/internal) was found in the PR description."
            echo "Add one (see the PR template), or apply the 'no-release-note' label if this PR ships nothing user-facing."
            exit 1
          fi
