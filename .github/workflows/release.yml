name: Release

# Optional CI wrapper over scripts/release.sh — the script stays the source of
# truth, this just runs it on a tag push. Single-shot per tag.
#
# DORMANT BY DEFAULT: the job is gated on the `RELEASE_ENABLED` repository
# variable, so pushing a `v*` tag while private is a no-op and bills zero runner
# minutes (GitHub macOS runners cost 10x on private repos). At the public
# cutover, set the variable to enable it:
#   gh variable set RELEASE_ENABLED --body true
# and unset it (or set to anything else) to disable again.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.7.0)"
        required: true

permissions:
  contents: write # create the GitHub Release + upload assets

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release-macos:
    # Dormant until this repo variable is explicitly set to "true".
    if: ${{ vars.RELEASE_ENABLED == 'true' }}
    # arm64 macOS runner: the only host that embeds BOTH companions (Xcode for
    # iOS, the preinstalled Android SDK for Android) — release.sh hard-fails if
    # either embeds empty. This job also CREATES the release; Linux uploads to it.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      # The Homebrew tap is a SEPARATE public repo, so the formula update must be
      # committed + pushed there. github.token can't push cross-repo → use a
      # fine-grained PAT (Contents:write on golem-fail/homebrew-golem) supplied as
      # the HOMEBREW_TAP_TOKEN secret.
      - name: Check out the Homebrew tap
        uses: actions/checkout@v5
        with:
          repository: golem-fail/homebrew-golem
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-golem

      - name: Build, package, and publish the macOS release + sync the tap formula
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          # One invocation: build + upload the mac asset + rewrite the tap
          # formula's version/url/sha256 in place (the mac sha256 is local here).
          scripts/release.sh --tag "$TAG" --formula homebrew-golem/Formula/golem.rb

      - name: Commit + push the updated tap formula
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          cd homebrew-golem
          if git diff --quiet; then
            echo "→ formula already up to date; nothing to push."
            exit 0
          fi
          # Bot identity — the GitHub Actions no-reply, so no personal/work email
          # leaks into the public tap history.
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "golem $TAG"
          git push

  release-linux:
    # Same gate. Runs after the macOS job has created the release, so this only
    # builds + uploads. ubuntu-latest is native amd64 → the Docker build is
    # native (fast) and free on a public repo.
    if: ${{ vars.RELEASE_ENABLED == 'true' }}
    needs: release-macos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # binfmt/QEMU so build-linux.sh's aarch64 preflight (which runs the built
      # binary in an arm64 alpine to confirm the Android companion embedded) can
      # execute an arm64 container on this amd64 runner.
      - uses: docker/setup-qemu-action@v3

      - name: Build + upload the Linux musl artifacts (x86_64 + aarch64)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          scripts/build-linux.sh
          GOLEM_LINUX_TARGET=aarch64-unknown-linux-musl scripts/build-linux.sh
          gh release upload "$TAG" \
            dist/golem-*-linux-musl.tar.gz \
            dist/golem-*-linux-musl.tar.gz.sha256 \
            --clobber

  publish-npm:
    # Same gate. Runs only after BOTH platform jobs have uploaded their assets —
    # the package's postinstall downloads the mac + linux binaries at install
    # time, so publishing before every asset exists would ship a broken package.
    if: ${{ vars.RELEASE_ENABLED == 'true' }}
    needs: [release-macos, release-linux]
    runs-on: ubuntu-latest
    # npm Trusted Publishing (OIDC): no long-lived NPM_TOKEN. id-token:write lets
    # npm mint a short-lived credential from GitHub's OIDC provider, and it emits
    # build provenance automatically. Configure the trusted publisher once on
    # npmjs (package → Settings → Trusted Publisher → GitHub Actions: golem-fail/
    # golem, workflow release.yml).
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Trusted Publishing needs npm >= 11.5.1 — newer than the npm bundled with
      # Node 20 — so upgrade before publishing.
      - run: npm install -g npm@latest

      # npm/package.json version tracks the tag via bump-version.sh. npm publish
      # is NOT idempotent — republishing an existing version hard-fails, which is
      # the desired guard against accidental double-publish.
      - name: Publish @golem-fail/golem to npm (Trusted Publishing / OIDC)
        working-directory: npm
        run: npm publish --access public
