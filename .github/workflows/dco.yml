name: DCO

# Enforce the Developer Certificate of Origin: every non-merge commit in a pull
# request must carry a `Signed-off-by:` trailer matching its author. Protects the
# project's right to ship + eventually relicense under Apache-2.0 (see LICENSE /
# docs/contributing.md). Self-contained (no external app), runs on ubuntu
# (1x minutes), so it's active immediately — not gated like the release workflow.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  dco:
    runs-on: ubuntu-latest # lightest hosted tier (2-core Linux, 1x billing)
    timeout-minutes: 5 # cap runaway (e.g. a hung fetch); default is 360
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify Signed-off-by on every commit
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          # Ensure both endpoints are present (fork PRs may lack the base object).
          git fetch --no-tags --quiet origin "$BASE" || true

          fail=0
          for sha in $(git rev-list --no-merges "$BASE..$HEAD"); do
            # Exempt bot authors (dependabot[bot], github-actions[bot], …): they
            # can't sign off, and their PRs are generated, not human contributions.
            authorname="$(git show -s --format='%an' "$sha")"
            case "$authorname" in
              *'[bot]') echo "skipping bot commit $sha ($authorname)"; continue ;;
            esac
            author="$(git show -s --format='%an <%ae>' "$sha")"
            signoffs="$(git show -s --format='%(trailers:key=Signed-off-by,valueonly)' "$sha")"
            if printf '%s\n' "$signoffs" | grep -qxF "$author"; then
              continue
            fi
            subject="$(git show -s --format='%s' "$sha")"
            echo "::error::Commit $sha is missing a matching Signed-off-by ($subject)"
            echo "    author:   $author"
            echo "    expected: Signed-off-by: $author"
            fail=1
          done

          if [ "$fail" -ne 0 ]; then
            echo ""
            echo "Add sign-off and force-push:  git rebase --signoff $BASE && git push --force-with-lease"
            echo "(Use \`git config user.email\` = your GitHub no-reply address to keep it private.)"
            exit 1
          fi
          echo "All commits carry a matching Signed-off-by."
