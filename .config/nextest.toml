# Nextest config — see https://nexte.st/docs/configuration/
#
# Goal: surface slow tests early. Most unit tests SHOULD be fast (<1s);
# anything taking longer is either doing real I/O, hitting a sleep
# without paused-time, or otherwise mis-shaped for a unit test.

[profile.default]
# Per-test output during a run: only show none/fail/retry/slow — passing
# tests are not printed, so failures and SLOW markers surface without
# tailing/grepping. Final summary still lists failures (final-status-level
# defaults to "fail"). Override with `--status-level pass` when debugging.
status-level = "slow"
# Tests slower than `period` get a SLOW marker (repeating every period).
# After `terminate-after` markers, the test is killed so a stuck test
# can't hold up the whole run. Real wall-clock kill = 2s × 5 = 10s.
# Most tests should be sub-second; flagging at 2s catches drift without
# noise from legitimately-slow integration-shaped tests (install-script
# forks ~1s; scroll-cycle loops up to ~5s).
slow-timeout = { period = "2s", terminate-after = 5 }

# These two tests deliberately fork a `sleep 10` script to exercise the
# install-script timeout/kill path. On macOS the kill reaps fast, but on Linux
# the orphaned child holds the output pipe until it exits naturally (~10s),
# which lands on the global 10s kill above and flakes in CI. Give just these
# two room (2s marker × 15 = 30s); the tight global guard stays for everything
# else, and the job-level `timeout-minutes` is the real runaway backstop.
[[profile.default.overrides]]
filter = 'test(/installer::tests::(script_timeout_kills_process|timeout_is_coded_install_timeout)/)'
slow-timeout = { period = "2s", terminate-after = 15 }
