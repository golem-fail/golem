[[apps]]
name = "app"
bundle = "fail.golem.test"
install_script = "scripts/install-app.sh"

# Native second app used by tests that need primitives Tauri 2.x doesn't
# expose (accessibility ids, native push receive bridge, etc.). Install
# scripts are per-platform — the iOS target is a SwiftUI Xcode project,
# the Android target is a Compose Activity.
[[apps]]
name = "app-b"
bundle = "fail.golem.testb"
install_script = { ios = "scripts/install-app-b-ios.sh", android = "scripts/install-app-b-android.sh" }

# Expo / React Native app. One cross-platform install script that branches
# on platform ($1) and build mode (EXPO_BUILD_MODE). The bare entry below is
# the default (local `expo prebuild` + Release build); the `profile = "eas"`
# sibling selects the EAS cloud build via `golem run --profile eas`, injecting
# the build-mode env. `--profile` picks the entry; the script only ever reads
# the env var, never the profile name.
[[apps]]
name = "app-e"
bundle = "fail.golem.teste"
install_script = "scripts/install-app-e.sh"

[[apps]]
name = "app-e"
profile = "eas"
bundle = "fail.golem.teste"
install_script = "scripts/install-app-e.sh"
install_env = { EXPO_BUILD_MODE = "eas", EAS_PROFILE = "preview" }

# Per-platform OS-level tweaks applied once per device session before
# any flow runs. Suppresses defaults that bias test results across
# emulator wipes / fresh sim images.
[device_settings.android]
# Android 14+ stylus handwriting overlay: a slow tap on a focused
# input pops a full-screen handwriting receiver that steals
# subsequent touches. Disable so sweeps under emulator load don't
# get hijacked.
"secure.stylus_handwriting_enabled" = "0"
"secure.stylus_handwriting_default_value" = "0"
# Suppress heads-up notification banners — they cover the app and
# can intercept taps.
"global.heads_up_notifications_enabled" = "0"

# GOLEM project configuration
# See documentation for all available options.
#
# Optional sections:
#   [options]              — defaults for flows (step_timeout, screenshot_on_failure, ...)
#   [vars]                 — project-level variables (referenced in flows as ${name})
#   [[apps]]               — app registry (bundle, install_script, install_timeout_ms, devices)
#   [device_settings]      — per-platform OS-level tweaks applied before flows run
#
# Run `golem install-script` to add an app and install script interactively.
