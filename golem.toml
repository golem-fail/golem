[[apps]]
name = "app"
bundle = "fail.golem.test"
install_script = "scripts/install-app.sh"

# Native second app used by tests that need primitives Tauri 2.x doesn't
# expose (accessibility ids, native push receive bridge, etc.). Install
# scripts are per-platform — the iOS target is a SwiftUI Xcode project,
# the Android target is a Compose Activity.
[[apps]]
name = "app-b"
bundle = "fail.golem.testb"
install_script = { ios = "scripts/install-app-b-ios.sh", android = "scripts/install-app-b-android.sh" }
# GOLEM project configuration
# See documentation for all available options.
#
# Optional sections:
#   [options]              — defaults for flows (step_timeout, screenshot_on_failure, ...)
#   [vars]                 — project-level variables (referenced in flows as ${name})
#   [[apps]]               — app registry (bundle, install_script, install_timeout_ms, devices)
#
# Run `golem install-script` to add an app and install script interactively.
