# Cargo aliases. `cargo test` is a built-in subcommand and can't be
# overridden, so `cargo t` is the project convention for running the
# workspace test suite via nextest (faster, parallel-isolated, slow-test
# kill via .config/nextest.toml).
#
# Install: `cargo binstall cargo-nextest` or `cargo install cargo-nextest`.

[alias]
t = "nextest run --workspace"
# Dev-only visual check of every EventKind / SubstepEvent rendering. The
# example is never linked into the release binary; run `cargo gallery` in a
# terminal to see the coloured output.
gallery = "run -p golem-report --example event_gallery"
